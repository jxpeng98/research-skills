map_version: "1.0.0"
name: "mcp-agent-capability-map"
scope: "task-level orchestration for Skills + MCP + Agents"

coordination_contract:
  entrypoint: "Task ID from standards/research-workflow-contract.yaml"
  required_packet_fields:
    - "task_id"
    - "paper_type"
    - "topic"
    - "required_outputs"
    - "required_skills"
    - "required_skill_cards"
    - "quality_gates"
  fixed_execution_chain:
    - "plan"
    - "mcp-evidence"
    - "primary-agent-draft"
    - "review-agent-check"
    - "validator-gate"

mcp_registry:
  - "filesystem"
  - "scholarly-search"
  - "citation-graph"
  - "metadata-registry"
  - "fulltext-retrieval"
  - "screening-tracker"
  - "extraction-store"
  - "stats-engine"
  - "code-runtime"
  - "reporting-guidelines"
  - "submission-kit"

agent_registry:
  - "codex"
  - "claude"
  - "gemini"

skill_registry:
  - "question-refiner"
  - "academic-searcher"
  - "paper-screener"
  - "paper-extractor"
  - "quality-assessor"
  - "gap-analyzer"
  - "theory-mapper"
  - "citation-snowballer"
  - "fulltext-fetcher"
  - "metadata-enricher"
  - "citation-formatter"
  - "reference-manager-bridge"
  - "study-designer"
  - "ethics-irb-helper"
  - "evidence-synthesizer"
  - "manuscript-architect"
  - "prisma-checker"
  - "reporting-checker"
  - "submission-packager"
  - "rebuttal-assistant"
  - "code-builder"
  - "model-collaborator"
  - "self-critique"
  - "hypothesis-generator"
  - "venue-analyzer"
  - "concept-extractor"
  - "literature-mapper"
  - "rival-hypothesis-designer"
  - "robustness-planner"
  - "deidentification-planner"
  - "publication-bias-checker"
  - "meta-optimizer"
  - "tone-normalizer"
  - "reviewer-empathy-checker"
  - "reproducibility-auditor"
  - "stats-engine"

skill_catalog:
  question-refiner:
    file: "skills/question-refiner.md"
    category: "framing"
    focus: "Refine research questions, scope boundaries, and keyword strategy."
    default_outputs:
      - "framing/research_question.md"
  academic-searcher:
    file: "skills/academic-searcher.md"
    category: "literature-discovery"
    focus: "Build reproducible multi-source search queries and seed corpus."
    default_outputs:
      - "literature/search_strategy.md"
      - "literature/search_results.csv"
  paper-screener:
    file: "skills/paper-screener.md"
    category: "study-selection"
    focus: "Screen records by inclusion/exclusion rules with decision trace."
    default_outputs:
      - "literature/screening_log.csv"
  paper-extractor:
    file: "skills/paper-extractor.md"
    category: "data-extraction"
    focus: "Extract structured study attributes, outcomes, and effect inputs."
    default_outputs:
      - "extraction/effect_size_table.csv"
  quality-assessor:
    file: "skills/quality-assessor.md"
    category: "quality-appraisal"
    focus: "Assess risk of bias, certainty, and evidence strength."
    default_outputs:
      - "quality/quality_assessment.md"
  gap-analyzer:
    file: "skills/gap-analyzer.md"
    category: "research-positioning"
    focus: "Identify unresolved theoretical, empirical, or methodological gaps."
    default_outputs:
      - "framing/research_gap.md"
  theory-mapper:
    file: "skills/theory-mapper.md"
    category: "theoretical-framing"
    focus: "Map constructs and derive testable propositions or hypotheses."
    default_outputs:
      - "framing/theoretical_framework.md"
  citation-snowballer:
    file: "skills/citation-snowballer.md"
    category: "citation-expansion"
    focus: "Expand corpus using forward/backward citation chaining."
    default_outputs:
      - "literature/snowball_log.md"
  fulltext-fetcher:
    file: "skills/fulltext-fetcher.md"
    category: "fulltext-acquisition"
    focus: "Resolve full text access, version provenance, and retrieval status."
    default_outputs:
      - "literature/fulltext_access_log.csv"
  metadata-enricher:
    file: "skills/metadata-enricher.md"
    category: "metadata-normalization"
    focus: "Normalize DOI, venue, year, author, and identifier metadata."
    default_outputs:
      - "references/metadata_registry.csv"
  citation-formatter:
    file: "skills/citation-formatter.md"
    category: "reference-formatting"
    focus: "Format references in target style and validate citation integrity."
    default_outputs:
      - "references/references_formatted.bib"
  reference-manager-bridge:
    file: "skills/reference-manager-bridge.md"
    category: "reference-sync"
    focus: "Sync citation library with Zotero/EndNote/Mendeley workflows."
    default_outputs:
      - "references/reference_manager_sync.md"
  study-designer:
    file: "skills/study-designer.md"
    category: "study-design"
    focus: "Design sampling, measures, procedures, and analysis plans."
    default_outputs:
      - "design/study_design.md"
      - "design/analysis_plan.md"
  ethics-irb-helper:
    file: "skills/ethics-irb-helper.md"
    category: "ethics-compliance"
    focus: "Prepare IRB-ready risk, consent, privacy, and governance content."
    default_outputs:
      - "compliance/irb_pack.md"
  evidence-synthesizer:
    file: "skills/evidence-synthesizer.md"
    category: "evidence-synthesis"
    focus: "Synthesize evidence narratively, qualitatively, or quantitatively."
    default_outputs:
      - "synthesis/synthesis.md"
  manuscript-architect:
    file: "skills/manuscript-architect.md"
    category: "manuscript-structure"
    focus: "Build coherent paper structure from outline to section-level drafts."
    default_outputs:
      - "manuscript/outline.md"
      - "manuscript/draft.md"
  prisma-checker:
    file: "skills/prisma-checker.md"
    category: "prisma-compliance"
    focus: "Verify PRISMA flow, checklist coverage, and reporting transparency."
    default_outputs:
      - "review/prisma_checklist.md"
  reporting-checker:
    file: "skills/reporting-checker.md"
    category: "reporting-compliance"
    focus: "Validate reporting guideline completeness for target study type."
    default_outputs:
      - "manuscript/reporting_checklist.md"
  submission-packager:
    file: "skills/submission-packager.md"
    category: "submission-readiness"
    focus: "Assemble cover letter, compliance files, and submission bundle."
    default_outputs:
      - "submission/submission_package.md"
  rebuttal-assistant:
    file: "skills/rebuttal-assistant.md"
    category: "revision-response"
    focus: "Generate point-by-point response and tracked revision plan."
    default_outputs:
      - "submission/rebuttal_response.md"
  code-builder:
    file: "skills/code-builder.md"
    category: "research-code"
    focus: "Translate methods into reproducible implementation and validation."
    default_outputs:
      - "code/implementation_plan.md"
      - "code/repro_report.md"
  model-collaborator:
    file: "skills/model-collaborator.md"
    category: "multi-agent-verification"
    focus: "Split execution and cross-review across model runtimes."
    default_outputs:
      - "logs/model_collab_trace.md"

  self-critique:
    file: "skills/self-critique.md"
    category: "quality-assurance"
    focus: "Iterative red teaming and Socratic critique of outputs."
    default_outputs:
      - "review/self_critique_log.md"
  hypothesis-generator:
    file: "skills/hypothesis-generator.md"
    category: "framing"
    focus: "Translate abstract research questions into testable formal hypotheses."
    default_outputs:
      - "framing/hypothesis.md"
  venue-analyzer:
    file: "skills/venue-analyzer.md"
    category: "framing"
    focus: "Analyze fit, format, and scoping constraints for target venue."
    default_outputs:
      - "framing/venue_analysis.md"
  concept-extractor:
    file: "skills/concept-extractor.md"
    category: "literature-discovery"
    focus: "Expand search seeds intelligently to break confirmation bias."
    default_outputs:
      - "literature/concept_extraction.md"
  literature-mapper:
    file: "skills/literature-mapper.md"
    category: "study-selection"
    focus: "Visualize and map State-of-the-art taxonomies prior to deep reading."
    default_outputs:
      - "literature/literature_map.md"
  rival-hypothesis-designer:
    file: "skills/rival-hypothesis-designer.md"
    category: "study-design"
    focus: "Proactively construct and address competitive theories."
    default_outputs:
      - "design/rival_hypotheses.md"
  robustness-planner:
    file: "skills/robustness-planner.md"
    category: "study-design"
    focus: "Pre-specify robustness checks, sensitivity analysis, and bounds scaling."
    default_outputs:
      - "design/robustness_plan.md"
  deidentification-planner:
    file: "skills/deidentification-planner.md"
    category: "ethics-compliance"
    focus: "Ensure technical privacy via k-anonymity or secure data pipelines."
    default_outputs:
      - "compliance/deidentification_plan.md"
  publication-bias-checker:
    file: "skills/publication-bias-checker.md"
    category: "evidence-synthesis"
    focus: "Evaluate fail-safe N, funnel plot asymmetry, and correction models."
    default_outputs:
      - "synthesis/publication_bias.md"
  meta-optimizer:
    file: "skills/meta-optimizer.md"
    category: "manuscript-structure"
    focus: "Optimize Abstract and Title for indexing, SEO, and engagement."
    default_outputs:
      - "manuscript/meta_optimization.md"
  tone-normalizer:
    file: "skills/tone-normalizer.md"
    category: "reporting-compliance"
    focus: "Ruthlessly cut fluff, transition words, and absolute claims."
    default_outputs:
      - "compliance/tone_normalization.md"
  reviewer-empathy-checker:
    file: "skills/reviewer-empathy-checker.md"
    category: "revision-response"
    focus: "Neutralize defensiveness and ensure exact addressing of concerns."
    default_outputs:
      - "revision/reviewer_empathy_check.md"
  reproducibility-auditor:
    file: "skills/reproducibility-auditor.md"
    category: "research-code"
    focus: "Verify magic numbers, random seeds, and fail-graceful contingencies."
    default_outputs:
      - "code/reproducibility_audit.md"
  stats-engine:
    file: "skills/stats-engine.md"
    category: "research-code"
    focus: "Statistical modeling, tests, and analytics execution."
    default_outputs:
      - "analysis/stats_report.md"

