# Canonical artifact type vocabulary
# Used across registry.yaml, skill frontmatter, and pipeline DAGs
# Each type defines: name, description, typical file format, produced_by, consumed_by

artifact_types:
  # ── A_framing outputs ──
  - name: RQSet
    description: "Structured research questions with PICO/PEO framework and FINER evaluation"
    format: markdown
    produced_by: [question-refiner]
    consumed_by: [study-designer, manuscript-architect, academic-searcher, hypothesis-generator, contribution-crafter]

  - name: ContributionStatement
    description: "Structured statement of theoretical, methodological, and empirical novelty"
    format: markdown
    produced_by: [contribution-crafter]
    consumed_by: [manuscript-architect, venue-analyzer]

  - name: HypothesisSet
    description: "Testable hypotheses with mechanisms, boundary conditions, and rival explanations"
    format: markdown
    produced_by: [hypothesis-generator]
    consumed_by: [study-designer, rival-hypothesis-designer]

  - name: TheoreticalFramework
    description: "Mapped theories, constructs, relationships, and Mermaid diagrams"
    format: markdown
    produced_by: [theory-mapper]
    consumed_by: [hypothesis-generator, manuscript-architect, study-designer]

  - name: GapAnalysis
    description: "Categorized research gaps with FINER prioritization matrix"
    format: markdown
    produced_by: [gap-analyzer]
    consumed_by: [question-refiner, hypothesis-generator, manuscript-architect]

  - name: VenueAnalysis
    description: "Venue fit analysis with formatting constraints and reviewer expectations"
    format: markdown
    produced_by: [venue-analyzer]
    consumed_by: [manuscript-architect, submission-packager, meta-optimizer]

  # ── B_literature outputs ──
  - name: SearchQueryPlan
    description: "Reproducible search strategy with database-specific queries and Boolean logic"
    format: markdown
    produced_by: [academic-searcher]
    consumed_by: [paper-screener, citation-snowballer]

  - name: SearchResults
    description: "Deduplicated search results with metadata in CSV format"
    format: csv
    produced_by: [academic-searcher]
    consumed_by: [paper-screener, gap-analyzer, literature-mapper]

  - name: SearchLog
    description: "Timestamped reproducibility log of all database queries and results"
    format: markdown
    produced_by: [academic-searcher]
    consumed_by: [prisma-checker]

  - name: ScreeningDecisionLog
    description: "Two-stage screening decisions with inclusion/exclusion reasons"
    format: markdown
    produced_by: [paper-screener]
    consumed_by: [paper-extractor, fulltext-fetcher, evidence-synthesizer]

  - name: PRISMAFlowData
    description: "Counts and flow data for PRISMA 2020 flow diagram"
    format: markdown
    produced_by: [paper-screener]
    consumed_by: [prisma-checker]

  - name: ExtractionTable
    description: "Structured data extraction from included papers"
    format: markdown
    produced_by: [paper-extractor]
    consumed_by: [quality-assessor, evidence-synthesizer, literature-mapper]

  - name: PaperNotes
    description: "Individual paper extraction notes (one file per paper)"
    format: markdown_directory
    produced_by: [paper-extractor]
    consumed_by: [citation-formatter, reference-manager-bridge, metadata-enricher]

  - name: SnowballLog
    description: "Forward/backward citation tracing log with relevance scores"
    format: markdown
    produced_by: [citation-snowballer]
    consumed_by: [paper-screener]

  - name: ConceptMap
    description: "Structured search concepts with controlled vocabulary candidates"
    format: markdown
    produced_by: [concept-extractor]
    consumed_by: [academic-searcher]

  - name: LiteratureMap
    description: "Taxonomy/map of literature with mechanism-based cluster labels"
    format: markdown
    produced_by: [literature-mapper]
    consumed_by: [manuscript-architect, gap-analyzer]

  - name: Bibliography
    description: "BibTeX bibliography file with consistent citekeys"
    format: bibtex
    produced_by: [citation-formatter, reference-manager-bridge, metadata-enricher]
    consumed_by: [manuscript-architect, submission-packager]

  # ── C_design outputs ──
  - name: DesignSpec
    description: "Complete study design including sampling, measures, procedures"
    format: markdown
    produced_by: [study-designer]
    consumed_by: [code-builder, ethics-irb-helper, rival-hypothesis-designer, robustness-planner, manuscript-architect, reporting-checker]

  - name: AnalysisPlan
    description: "Pre-specified analysis plan with methods and assumptions"
    format: markdown
    produced_by: [study-designer]
    consumed_by: [robustness-planner, code-builder, stats-engine]

  - name: DataManagementPlan
    description: "FAIR-aligned plan covering storage, governance, sharing, and retention"
    format: markdown
    produced_by: [study-designer, data-management-plan]
    consumed_by: [ethics-irb-helper, deidentification-planner, submission-packager]

  - name: Instruments
    description: "Survey, interview, observation, or extraction instrument package"
    format: markdown_directory
    produced_by: [study-designer, data-dictionary-builder]
    consumed_by: [ethics-irb-helper, code-builder]

  - name: Preregistration
    description: "Preregistration draft specifying hypotheses, design, and decision rules"
    format: markdown
    produced_by: [study-designer, prereg-writer]
    consumed_by: [reporting-checker, submission-packager]

  - name: DatasetPlan
    description: "Feasible dataset options, access routes, provenance, and coverage constraints"
    format: markdown
    produced_by: [dataset-finder]
    consumed_by: [data-cleaning-planner, data-merge-planner, ethics-irb-helper, code-builder]

  - name: VariableSpec
    description: "Operational variable specification with source, unit, coding, and transformations"
    format: markdown
    produced_by: [variable-constructor]
    consumed_by: [data-cleaning-planner, data-merge-planner, code-builder, stats-engine]

  - name: DataDictionary
    description: "Codebook defining variable labels, types, coding rules, and provenance"
    format: markdown
    produced_by: [data-dictionary-builder]
    consumed_by: [code-builder, data-cleaning-planner]

  - name: RivalHypotheses
    description: "Competing theories and rival explanations with design countermeasures"
    format: markdown
    produced_by: [rival-hypothesis-designer]
    consumed_by: [study-designer, robustness-planner]

  - name: RobustnessPlan
    description: "Pre-specified robustness checks and sensitivity analyses"
    format: markdown
    produced_by: [robustness-planner]
    consumed_by: [code-builder, stats-engine]

  # ── D_ethics outputs ──
  - name: EthicsPackage
    description: "IRB-ready materials: risk assessment, consent, recruitment, data governance"
    format: markdown
    produced_by: [ethics-irb-helper]
    consumed_by: [deidentification-planner, submission-packager]

  - name: DeidentificationPlan
    description: "Technical privacy measures and data transformation procedures"
    format: markdown
    produced_by: [deidentification-planner]
    consumed_by: [code-builder]

  # ── E_synthesis outputs ──
  - name: EvidenceTable
    description: "Structured claim→evidence→strength mapping table"
    format: markdown
    produced_by: [evidence-synthesizer]
    consumed_by: [manuscript-architect, publication-bias-checker]

  - name: EffectSizeTable
    description: "Calculated standard effect sizes from raw statistics for meta-analysis"
    format: markdown
    produced_by: [effect-size-calculator]
    consumed_by: [evidence-synthesizer, stats-engine]

  - name: SynthesisMatrix
    description: "Cross-study synthesis matrix aligning studies, constructs, methods, and outcomes"
    format: markdown
    produced_by: [evidence-synthesizer]
    consumed_by: [manuscript-architect, publication-bias-checker]

  - name: QualityTable
    description: "Risk-of-bias and certainty-of-evidence assessments per study"
    format: markdown
    produced_by: [quality-assessor]
    consumed_by: [evidence-synthesizer]

  - name: ExtractedText
    description: "Raw qualitative data or extracted quotes"
    format: markdown_directory
    produced_by: [paper-extractor, qualitative-coding]
    consumed_by: [qualitative-coding]

  - name: ResearchContext
    description: "Research question and domain context"
    format: markdown
    produced_by: [question-refiner]
    consumed_by: [qualitative-coding]

  - name: ThematicCodebook
    description: "Thematic codebook derived from qualitative data"
    format: markdown
    produced_by: [qualitative-coding]
    consumed_by: [evidence-synthesizer]

  - name: GRADESummary
    description: "GRADE Summary of Findings table"
    format: markdown
    produced_by: [quality-assessor]
    consumed_by: [manuscript-architect]

  - name: PublicationBiasReport
    description: "Bias diagnostics such as funnel asymmetry, fail-safe N, or trim-and-fill results"
    format: markdown
    produced_by: [publication-bias-checker]
    consumed_by: [manuscript-architect, reporting-checker]

  # ── F_writing outputs ──
  - name: ManuscriptOutline
    description: "Section-level outline with claim-evidence mapping"
    format: markdown
    produced_by: [manuscript-architect]
    consumed_by: [tone-normalizer, reporting-checker]

  - name: Manuscript
    description: "Full draft manuscript text"
    format: markdown
    produced_by: [manuscript-architect]
    consumed_by: [tone-normalizer, prisma-checker, reporting-checker, meta-optimizer, fatal-flaw-detector, peer-review-simulation, submission-packager]

  - name: ClaimGraph
    description: "Claim-evidence integrity map linking assertions to supporting data"
    format: markdown
    produced_by: [manuscript-architect]
    consumed_by: [reporting-checker, self-critique]

  - name: FiguresTablesPlan
    description: "Planned figures and tables with purpose, evidence linkage, and placement"
    format: markdown
    produced_by: [manuscript-architect]
    consumed_by: [table-generator, figure-specifier]

  - name: ResultInterpretation
    description: "Narrative interpretation of model results, uncertainty, and robustness implications"
    format: markdown
    produced_by: [analysis-interpreter]
    consumed_by: [manuscript-architect, reporting-checker]

  - name: EffectInterpretation
    description: "Magnitude-focused interpretation translating estimates into substantive effects"
    format: markdown
    produced_by: [effect-size-interpreter]
    consumed_by: [manuscript-architect, reporting-checker]

  - name: ResultsSummary
    description: "Summarized findings and statistical/thematic results"
    format: markdown
    produced_by: [analysis-interpreter, stats-engine]
    consumed_by: [discussion-writer]

  - name: DiscussionDraft
    description: "Draft text for the discussion section separating findings from implications"
    format: markdown
    produced_by: [discussion-writer]
    consumed_by: [manuscript-architect]

  - name: StorySpine
    description: "Structured narrative spine linking findings to literature"
    format: markdown
    produced_by: [discussion-writer]
    consumed_by: [manuscript-architect]

  - name: FormattedTables
    description: "Publication-ready tables in draft and exportable formats"
    format: markdown_directory
    produced_by: [table-generator]
    consumed_by: [manuscript-architect, submission-packager]

  - name: FigureSpecs
    description: "Reproducible figure specifications, captions, and rendering instructions"
    format: markdown_directory
    produced_by: [figure-specifier]
    consumed_by: [manuscript-architect, submission-packager]

  - name: MetaOptimization
    description: "Optimized abstract, title, and keywords for discoverability"
    format: markdown
    produced_by: [meta-optimizer]
    consumed_by: [submission-packager]

  # ── G_compliance outputs ──
  - name: PRISMAChecklist
    description: "PRISMA 2020 compliance checklist with item-by-item verification"
    format: markdown
    produced_by: [prisma-checker]
    consumed_by: [submission-packager]

  - name: ReportingChecklist
    description: "Study-type-specific reporting guideline checklist (CONSORT/STROBE/etc.)"
    format: markdown
    produced_by: [reporting-checker]
    consumed_by: [submission-packager]

  - name: ToneNormalization
    description: "Tone-normalized text with tracked changes and fluff removal"
    format: markdown
    produced_by: [tone-normalizer]
    consumed_by: [manuscript-architect]

  # ── H_submission outputs ──
  - name: DraftManuscript
    description: "The full manuscript draft including methods and discussion"
    format: markdown
    produced_by: [manuscript-architect]
    consumed_by: [limitation-auditor]

  - name: MethodologicalFramework
    description: "The core research design and constraints"
    format: markdown
    produced_by: [study-designer]
    consumed_by: [limitation-auditor]

  - name: LimitationSection
    description: "Audit output mapping limitations directly to research constraints"
    format: markdown
    produced_by: [limitation-auditor]
    consumed_by: [submission-packager]

  - name: MitigationStrategy
    description: "Strategies to mitigate or justify each identified limitation"
    format: markdown
    produced_by: [limitation-auditor]
    consumed_by: [submission-packager]

  - name: SubmissionPackage
    description: "Cover letter, disclosures, title page, and supplementary materials"
    format: markdown
    produced_by: [submission-packager]
    consumed_by: []

  - name: ResponseToReviewers
    description: "Point-by-point response matrix with action tags"
    format: markdown
    produced_by: [rebuttal-assistant]
    consumed_by: [reviewer-empathy-checker]

  - name: ResponseLetter
    description: "Formatted response letter for editor submission"
    format: markdown
    produced_by: [rebuttal-assistant]
    consumed_by: [reviewer-empathy-checker]

  - name: PeerReviewSimulation
    description: "Simulated multi-persona review with reconciled feedback"
    format: markdown
    produced_by: [peer-review-simulation]
    consumed_by: [fatal-flaw-detector, manuscript-architect]

  - name: FatalFlawAnalysis
    description: "Critical flaw analysis with severity ratings and remediations"
    format: markdown
    produced_by: [fatal-flaw-detector]
    consumed_by: [manuscript-architect]

  # ── I_code outputs ──
  - name: CodeSpec
    description: "Strict constraint set and requirement specification for code"
    format: markdown
    produced_by: [code-specification]
    consumed_by: [code-planning]

  - name: CodePlan
    description: "Parallelizable, zero-decision execution plan"
    format: markdown
    produced_by: [code-planning]
    consumed_by: [code-execution]

  - name: AnalysisCode
    description: "Executable analysis code with tests and diagnostics"
    format: code_directory
    produced_by: [code-builder]
    consumed_by: [code-review, code-execution, reproducibility-auditor]

  - name: CleaningPlan
    description: "Executable cleaning rules for validation, missingness, and harmonization"
    format: markdown
    produced_by: [data-cleaning-planner]
    consumed_by: [code-builder, code-execution]

  - name: MergePlan
    description: "Join logic, key validation, and provenance rules for multi-source datasets"
    format: markdown
    produced_by: [data-merge-planner]
    consumed_by: [code-builder, code-execution]

  - name: ReproducibilityReport
    description: "Reproducibility audit covering seeds, environment, containerization"
    format: markdown
    produced_by: [reproducibility-auditor]
    consumed_by: [submission-packager]

  - name: StatsReport
    description: "Statistical analysis results with effect sizes and diagnostics"
    format: markdown
    produced_by: [stats-engine]
    consumed_by: [manuscript-architect, evidence-synthesizer, analysis-interpreter, effect-size-interpreter, table-generator, figure-specifier]

  # ── K_presentation outputs ──
  - name: PresentationPlan
    description: "Talk-level story arc, timing budget, and audience calibration plan"
    format: markdown
    produced_by: [presentation-planner]
    consumed_by: [slide-architect]

  - name: SlideDeckSpec
    description: "Slide-by-slide specification including assertions, evidence, layout, and speaker notes"
    format: markdown
    produced_by: [slide-architect]
    consumed_by: [slidev-scholarly-builder, beamer-builder]

  - name: SlidevDeck
    description: "Slidev presentation project with scholarly layouts and citation wiring"
    format: markdown_directory
    produced_by: [slidev-scholarly-builder]
    consumed_by: []

  - name: BeamerDeck
    description: "LaTeX Beamer presentation source ready for PDF compilation"
    format: latex_directory
    produced_by: [beamer-builder]
    consumed_by: []

  - name: BibTeXFile
    description: "BibTeX bibliography file packaged specifically for slide builders"
    format: bibtex
    produced_by: [slidev-scholarly-builder, beamer-builder]
    consumed_by: []

  # ── Cross-cutting and integration types ──
  - name: UserQuery
    description: "Original user request or problem statement packet"
    format: markdown
    produced_by: []
    consumed_by: [question-refiner, venue-analyzer, code-specification]

  - name: AnyArtifact
    description: "Generic placeholder for any artifact entering a critique or QA pass"
    format: markdown
    produced_by: []
    consumed_by: [self-critique]

  - name: TaskPacket
    description: "Structured orchestration packet containing task metadata and execution requirements"
    format: markdown
    produced_by: [research-orchestrator]
    consumed_by: [model-collaborator]

  - name: CollaborationTrace
    description: "Execution trace showing handoffs, reviews, and cross-model decisions"
    format: markdown
    produced_by: [model-collaborator]
    consumed_by: [research-orchestrator]

  - name: CritiqueLog
    description: "Structured red-team critique log with identified weaknesses and fixes"
    format: markdown
    produced_by: [self-critique]
    consumed_by: [research-orchestrator]

  - name: ResearchStateSnapshot
    description: "Project-level academic state summary capturing current question, locked decisions, evidence position, disputes, and next-stage priorities"
    format: markdown
    produced_by: [academic-context-maintainer]
    consumed_by: [manuscript-architect, discussion-writer, submission-packager, fatal-flaw-detector, reviewer-empathy-checker, model-collaborator, self-critique]

  - name: ResearchDecisionLog
    description: "Auditable decision ledger recording why major framing, design, synthesis, and submission choices were made"
    format: markdown
    produced_by: [academic-context-maintainer]
    consumed_by: [study-designer, ethics-irb-helper, evidence-synthesizer, manuscript-architect, submission-packager, model-collaborator]

  - name: LiteratureCorpus
    description: "Working literature corpus assembled from search and screening steps"
    format: markdown
    produced_by: [academic-searcher, paper-screener]
    consumed_by: [theory-mapper, gap-analyzer]

  - name: FullTextStatus
    description: "Status ledger for full-text retrieval attempts and source provenance"
    format: markdown
    produced_by: [fulltext-fetcher]
    consumed_by: [paper-extractor, paper-screener]

  - name: RISExport
    description: "Reference library export in RIS format"
    format: ris
    produced_by: [reference-manager-bridge]
    consumed_by: []

  - name: CSLJSONExport
    description: "Reference library export in CSL-JSON format"
    format: json
    produced_by: [reference-manager-bridge]
    consumed_by: []

  - name: ReviewComments
    description: "Reviewer or editor comments requiring structured response"
    format: markdown
    produced_by: []
    consumed_by: [rebuttal-assistant]

  - name: EmpathyCheck
    description: "Tone and responsiveness review for rebuttal documents"
    format: markdown
    produced_by: [reviewer-empathy-checker]
    consumed_by: [rebuttal-assistant]

  - name: PerformanceProfile
    description: "Performance profiling output for executed research code"
    format: markdown
    produced_by: [code-execution]
    consumed_by: [code-review, reproducibility-auditor]

  - name: CodeReview
    description: "Structured review of research code correctness, security, and statistical logic"
    format: markdown
    produced_by: [code-review]
    consumed_by: [code-builder, reproducibility-auditor]

  - name: DomainProfile
    description: "Domain-specific coding and method preferences used to guide implementation"
    format: markdown
    produced_by: []
    consumed_by: [code-builder, code-review]

  - name: OperationalizationMap
    description: "Construct-to-variable mapping with instrument selection, validity evidence, and traceability"
    format: markdown
    produced_by: [variable-operationalizer]
    consumed_by: [variable-constructor, data-dictionary-builder, study-designer]

  - name: CRediTStatement
    description: "CRediT author contribution statement with ICMJE cross-check"
    format: markdown
    produced_by: [credit-taxonomy-helper]
    consumed_by: [submission-packager]

  # ── J_proofread outputs ──
  - name: AIDetectionReport
    description: "AI fingerprint detection report with flagged passages, pattern types, and severity"
    format: markdown
    produced_by: [ai-fingerprint-scanner]
    consumed_by: [human-voice-rewriter]

  - name: HumanizedManuscript
    description: "Manuscript with AI-flagged passages rewritten to sound authentically human-authored"
    format: markdown
    produced_by: [human-voice-rewriter]
    consumed_by: [similarity-checker, final-proofreader]

  - name: SimilarityReport
    description: "Text overlap and originality analysis with flagged passages and rewrite suggestions"
    format: markdown
    produced_by: [similarity-checker]
    consumed_by: [final-proofreader]

  - name: ProofreadChecklist
    description: "Final proofread checklist covering grammar, consistency, formatting, and cross-references"
    format: markdown
    produced_by: [final-proofreader]
    consumed_by: [submission-packager]

  - name: ReleasePackage
    description: "Reproducible release bundle containing code, data, environment specifications, and documentation for archival repositories"
    format: directory
    produced_by: [release-packager]
    consumed_by: [submission-packager]
