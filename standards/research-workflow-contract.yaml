    A3: "/build-framework"
    A4: "/find-gap"
    A5: "/paper [topic] --focus venue_analysis"
    B1: "/lit-review"
    B1_5: "/lit-review [topic] --focus concept-extraction"
    B2: "/paper-read"
    B3: "/lit-review [topic] --focus citation-snowballing"
    B4: "/academic-write related-work [topic]"
    B5: "Use Claude to format citations into bibliography.bib"
    B6: "Use Claude to generate literature/literature_map.md"
    C1: "/study-design"
    C1_5: "/study-design [topic] --focus rival_hypotheses"
    C2: "/study-design [topic] --focus instruments"
    C3: "/study-design [topic] --focus analysis_plan"
    C3_5: "/study-design [topic] --focus robustness_plan"
    C4: "Use Claude to draft data_management_plan.md"
    C5: "/study-design [topic] --focus preregistration"
    D1: "/ethics-check"
    D2: "/academic-write ethics [topic]"
    D3: "/ethics-check [topic] --focus deidentification"
    E1: "/synthesize [topic] --focus meta_analysis_plan"
    E2: "/synthesize [topic] --focus effect_size_table"
    E3: "/synthesize [topic] --focus meta_analysis_results"
    E3_5: "/synthesize [topic] --focus publication_bias"
    E4: "/synthesize [topic] --focus certainty_grading"
    E5: "/synthesize"
    F1: "/paper-write [topic] --focus outline"
    F2: "/academic-write [section] [topic]"
    F3: "/paper-write"
    F4: "Use Claude to generate manuscript/claims_evidence_map.md"
    F5: "/paper-write [topic] --focus figures_tables"
    F6: "/paper-write [topic] --focus meta_optimization"
    G1: "/submission-prep [topic] --focus reporting_checklist"
    G2: "/lit-review [topic] --focus prisma_checklist"
    G3: "Use Claude to verify manuscript/claims_evidence_map.md"
    G4: "Use Claude to perform tone_normalization.md"
    H1: "/submission-prep"
    H2: "/rebuttal"
    H2_5: "/rebuttal [topic] --focus reviewer_empathy"
    H3: "/rebuttal [topic] --focus peer_review_simulation"
