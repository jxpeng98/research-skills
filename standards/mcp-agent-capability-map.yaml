map_version: "1.0.0"
name: "mcp-agent-capability-map"
scope: "task-level orchestration for Skills + MCP + Agents"

coordination_contract:
  entrypoint: "Task ID from standards/research-workflow-contract.yaml"
  required_packet_fields:
    - "task_id"
    - "paper_type"
    - "topic"
    - "required_outputs"
    - "required_skills"
    - "required_skill_cards"
    - "quality_gates"
  fixed_execution_chain:
    - "plan"
    - "mcp-evidence"
    - "primary-agent-draft"
    - "review-agent-check"
    - "validator-gate"

mcp_registry:
  - "filesystem"
  - "scholarly-search"
  - "citation-graph"
  - "metadata-registry"
  - "fulltext-retrieval"
  - "screening-tracker"
  - "extraction-store"
  - "stats-engine"
  - "code-runtime"
  - "reporting-guidelines"
  - "submission-kit"

# Provider adapters and database-specific connectors belong in MCP / bridge space.
# They should not be modeled as top-level skills unless they own a distinct contract artifact.
skill_granularity_policy:
  top_level_skill_criteria:
    - "Consumes typed inputs and produces typed outputs"
    - "Owns at least one stable artifact path under RESEARCH/[topic]/"
    - "Is worth direct task/pipeline dependency wiring"
    - "Carries distinct failure modes or review expectations"
  keep_as_embedded_subflow:
    - "query-builder"
    - "keyword-expander"
    - "methodology-extractor"
    - "dataset-extractor"
    - "theory-extractor"
    - "limitation-extractor"
  keep_in_provider_layer:
    - "semantic-scholar-search"
    - "crossref-search"
    - "openalex-search"
    - "database-connector"
    - "zotero-sync"
    - "doi-metadata-lookup"

provider_capability_examples:
  scholarly-search:
    includes:
      - "semantic-scholar-search"
      - "crossref-search"
      - "openalex-search"
      - "keyword expansion against provider indexes"
  metadata-registry:
    includes:
      - "doi lookup"
      - "venue normalization"
      - "citation export/import metadata sync"
  fulltext-retrieval:
    includes:
      - "retrieval-manifest planning"
      - "local fulltext path verification"
      - "oa resolution"
      - "repository fallback"
      - "publisher landing-page resolution"

literature_provider_contract:
  shared_bundle:
    - "search_strategy.md"
    - "search_log.md"
    - "search_results.csv"
    - "dedup_log.csv"
    - "snowball_log.md"
    - "bibliography.bib"
    - "screening/full_text.md"
    - "retrieval_manifest.csv"
  scholarly-search:
    owns_artifacts:
      - "search_strategy.md"
      - "search_log.md"
      - "search_results.csv"
    appends_to:
      - "dedup_log.csv"
    responsibilities:
      - "provider-backed discovery"
      - "query translation and execution"
      - "raw hit capture before screening"
    must_not_own:
      - "bibliography.bib"
      - "retrieval_manifest.csv"
  citation-graph:
    owns_artifacts:
      - "snowball_log.md"
    appends_to:
      - "search_results.csv"
      - "dedup_log.csv"
    responsibilities:
      - "seed-paper expansion"
      - "forward and backward citation tracing"
      - "traceable corpus-growth logging"
    must_not_own:
      - "search_strategy.md"
      - "bibliography.bib"
      - "retrieval_manifest.csv"
  metadata-registry:
    owns_artifacts:
      - "bibliography.bib"
    appends_to:
      - "dedup_log.csv"
    responsibilities:
      - "identifier normalization"
      - "metadata merge and citekey stabilization"
      - "venue/year/author/DOI cleanup"
      - "ingest and normalize local reference state from bibtex, ris, csl-json, search results, or notes"
    must_not_own:
      - "search_strategy.md"
      - "retrieval_manifest.csv"
  fulltext-retrieval:
    owns_artifacts:
      - "screening/full_text.md"
      - "retrieval_manifest.csv"
    responsibilities:
      - "full-text access resolution"
      - "version provenance"
      - "PRISMA-style retrieval status tracking"
    must_not_own:
      - "search_strategy.md"
      - "bibliography.bib"

agent_registry:
  - "codex"
  - "claude"
  - "gemini"

# Runtime agent registry above is intentionally model-only.
# Functional ownership is tracked separately below so we do not mix
# "who owns the research responsibility" with "which model executes it".
functional_agent_registry:
  - "research-orchestrator"
  - "literature-agent"
  - "theory-agent"
  - "methodology-agent"
  - "data-agent"
  - "analysis-agent"
  - "code-review-agent"
  - "writing-agent"
  - "publication-agent"

functional_agents:
  research-orchestrator:
    file: "roles/research-orchestrator.yaml"
    focus: "Cross-stage planning, prerequisite checks, contract integrity, and handoff management."
    owns_stages:
      - "A"
      - "B"
      - "C"
      - "D"
      - "E"
      - "F"
      - "G"
      - "H"
      - "I"
      - "J"
  literature-agent:
    file: "roles/literature-ra.yaml"
    mapped_role: "literature-ra"
    focus: "Search, screening, extraction, citation expansion, and literature mapping."
    owns_stages:
      - "B"
  theory-agent:
    file: "roles/theory-agent.yaml"
    mapped_role: "theory-agent"
    focus: "Theoretical framing, mechanism building, hypothesis logic, and gap interpretation."
    owns_stages:
      - "A"
  methodology-agent:
    file: "roles/methods-lead.yaml"
    mapped_role: "methods-lead"
    focus: "Study design, identification strategy, robustness, and preregistration design."
    owns_stages:
      - "C"
  data-agent:
    file: "roles/data-agent.yaml"
    mapped_role: "data-agent"
    focus: "Dataset strategy, data management, privacy controls, and data-pipeline handoff."
    owns_stages:
      - "C"
      - "D"
      - "I"
  analysis-agent:
    file: "roles/statistician.yaml"
    mapped_role: "statistician"
    focus: "Quantitative execution, diagnostics, synthesis, and numerical interpretation."
    owns_stages:
      - "E"
      - "I"
  code-review-agent:
    file: "roles/academic-code-reviewer.yaml"
    mapped_role: "academic-code-reviewer"
    focus: "Independent academic code review for method fidelity, inferential validity, leakage, and reproducibility evidence."
    owns_stages:
      - "I"
  writing-agent:
    file: "roles/science-writer.yaml"
    mapped_role: "science-writer"
    focus: "Drafting, restructuring, deep interpretation, and claim presentation."
    owns_stages:
      - "F"
  publication-agent:
    file: "roles/compliance-officer.yaml"
    mapped_role: "compliance-officer"
    focus: "Reporting checklist ownership, submission packaging, rebuttal, and compliance review."
    owns_stages:
      - "D"
      - "G"
      - "H"
      - "J"

