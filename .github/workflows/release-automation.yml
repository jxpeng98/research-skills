name: Release Automation

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run phase"
        required: true
        type: choice
        default: pre
        options:
          - pre
          - post
          - publish
      version:
        description: "Release version for publish mode (for example 0.1.0 or 0.1.1b1)"
        required: false
        type: string
      tag:
        description: "Release tag (for example v0.1.0 or v0.1.1-beta.1)"
        required: false
        type: string
      skip_smoke:
        description: "Skip smoke checks in pre mode"
        required: false
        type: boolean
        default: false
      skip_note_gen:
        description: "Skip auto draft generation for release notes in pre mode"
        required: false
        type: boolean
        default: false
      note_overwrite:
        description: "Overwrite existing release note draft in pre mode"
        required: false
        type: boolean
        default: false
      from_tag:
        description: "Optional baseline tag for release note draft highlights"
        required: false
        type: string
      skip_remote:
        description: "Skip remote ref checks in post mode"
        required: false
        type: boolean
        default: false
      skip_ci_status:
        description: "Skip GitHub Actions status check in post mode"
        required: false
        type: boolean
        default: false
      create_release:
        description: "Create GitHub release page in post mode"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Inject packaged upstream defaults
        run: bash scripts/inject_project_toml.sh

      - name: Build packaged assets for release attachment
        run: |
          pip install build twine
          python -m build

      - name: Run release automation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --force --prune origin +refs/heads/*:refs/remotes/origin/* +refs/tags/*:refs/tags/*
          if [[ "${{ github.event_name }}" == "push" ]]; then
            mode="post"
            tag="${{ github.ref_name }}"
          else
            mode="${{ inputs.mode }}"
            tag="${{ inputs.tag }}"
          fi
          args=()

          if [[ "$mode" == "publish" ]]; then
            if [[ -z "${{ inputs.version }}" ]]; then
              echo "publish mode requires 'version' input" >&2
              exit 2
            fi
            args+=(--version "${{ inputs.version }}")
          else
            if [[ -z "$tag" ]]; then
              echo "${mode} mode requires 'tag' input" >&2
              exit 2
            fi
            args+=(--tag "$tag")
          fi

          if [[ "${{ inputs.skip_smoke }}" == "true" ]]; then
            args+=(--skip-smoke)
          fi
          if [[ "${{ inputs.skip_note_gen }}" == "true" ]]; then
            args+=(--skip-note-gen)
          fi
          if [[ "${{ inputs.note_overwrite }}" == "true" ]]; then
            args+=(--note-overwrite)
          fi
          if [[ -n "${{ inputs.from_tag }}" ]]; then
            args+=(--from-tag "${{ inputs.from_tag }}")
          fi
          if [[ "${{ github.event_name }}" != "push" && "${{ inputs.skip_remote }}" == "true" ]]; then
            args+=(--skip-remote)
          fi
          if [[ "${{ github.event_name }}" != "push" && "${{ inputs.skip_ci_status }}" == "true" ]]; then
            args+=(--skip-ci-status)
          fi
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.create_release }}" == "true" ]]; then
            args+=(--create-release)
          elif [[ "$mode" == "publish" ]]; then
            args+=(--no-create-release)
          fi

          if [[ "$mode" != "publish" ]]; then
            bash scripts/verify_release_tag_version.sh --tag "$tag"
          fi

          ./scripts/release_automation.sh "$mode" "${args[@]}"

      - name: Upload release acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-acceptance
          path: release/acceptance/
          if-no-files-found: ignore
