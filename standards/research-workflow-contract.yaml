contract_version: "1.0.0"
name: "research-workflow-contract"
scope: "cross-model academic paper workflow"

artifacts:
  root: "RESEARCH/[topic]/"
  required_core:
    - "protocol.md"
    - "framing/research_question.md"
    - "framing/contribution_statement.md"
    - "manuscript/manuscript.md"
    - "framing/hypothesis.md"
    - "framing/venue_analysis.md"
    - "theoretical_framework.md"
    - "gap_analysis.md"
    - "search_strategy.md"
    - "literature/concept_extraction.md"
    - "literature/literature_map.md"
    - "notes/"
    - "bibliography.bib"
    - "search_log.md"
    - "search_results.csv"
    - "dedup_log.csv"
    - "retrieval_manifest.csv"
    - "screening/title_abstract.md"
    - "screening/full_text.md"
    - "screening/prisma_flow.md"
    - "extraction_table.md"
    - "quality_table.md"
    - "synthesis_matrix.md"
    - "synthesis.md"
    - "meta_analysis_plan.md"
    - "effect_size_table.md"
    - "meta_analysis_results.md"
    - "study_design.md"
    - "design/rival_hypotheses.md"
    - "analysis_plan.md"
    - "design/variable_spec.md"
    - "design/robustness_plan.md"
    - "design/dataset_plan.md"
    - "data_management_plan.md"
    - "data/cleaning_plan.md"
    - "data/merge_plan.md"
    - "ethics_irb.md"
    - "compliance/deidentification_plan.md"
    - "manuscript/results_interpretation.md"
    - "manuscript/effect_interpretation.md"
    - "manuscript/tables/"
    - "manuscript/figures/"
    - "reporting_checklist.md"
    - "submission/cover_letter.md"
    - "submission/submission_checklist.md"
    - "submission/title_page.md"
    - "submission/highlights.md"
    - "submission/suggested_reviewers.md"
    - "submission/author_contributions_credit.md"
    - "submission/funding_statement.md"
    - "submission/coi_statement.md"
    - "submission/data_availability.md"
    - "submission/ai_disclosure.md"
    - "submission/supplementary_inventory.md"
    - "revision/response_matrix.md"
    - "revision/response_letter.md"
    - "proofread/ai_detection_report.md"
    - "proofread/humanized_manuscript.md"
    - "proofread/similarity_report.md"
    - "proofread/proofread_checklist.md"

paper_types:
  - id: "empirical"
    focus: "design, data, methods, results, validity"
  - id: "qualitative"
    focus: "qualitative design, sampling, coding, interpretation, trustworthiness"
  - id: "systematic-review"
    focus: "PRISMA search-screen-extract-synthesize-report"
  - id: "methods"
    focus: "new method + validation + comparative evidence"
  - id: "theory"
    focus: "constructs, propositions, conceptual contribution"

literature_evidence_bundle:
  shared_artifacts:
    - "search_strategy.md"
    - "search_log.md"
    - "search_results.csv"
    - "dedup_log.csv"
    - "snowball_log.md"
    - "bibliography.bib"
    - "screening/full_text.md"
    - "retrieval_manifest.csv"
  provider_roles:
    scholarly-search:
      owns:
        - "search_strategy.md"
        - "search_log.md"
        - "search_results.csv"
      appends:
        - "dedup_log.csv"
      responsibilities:
        - "query planning and provider-specific query translation"
        - "raw provider hit capture before screening"
        - "initial dedup candidate generation"
    citation-graph:
      owns:
        - "snowball_log.md"
      appends:
        - "search_results.csv"
        - "dedup_log.csv"
      responsibilities:
        - "forward/backward seed expansion"
        - "traceable corpus growth beyond direct query hits"
    metadata-registry:
      owns:
        - "bibliography.bib"
      appends:
        - "dedup_log.csv"
      responsibilities:
        - "identifier normalization and merge decisions"
        - "author/venue/year/DOI normalization"
        - "citekey stabilization for downstream notes and exports"
    fulltext-retrieval:
      owns:
        - "screening/full_text.md"
        - "retrieval_manifest.csv"
      responsibilities:
        - "full-text access resolution"
        - "version and provenance tracking"
        - "retrieval status needed for PRISMA-style reporting"

stages:
  - id: "A"
    name: "framing-positioning"
    sequence_index: 1
    phase_type: "core"
    outputs:
      - "framing/research_question.md"
      - "framing/hypothesis.md"
      - "framing/contribution_statement.md"
      - "theoretical_framework.md"
      - "gap_analysis.md"
      - "framing/venue_analysis.md"
  - id: "B"
    name: "literature-related-work"
    sequence_index: 2
    phase_type: "core"
    outputs:
      - "protocol.md"
      - "search_strategy.md"
      - "literature/concept_extraction.md"
      - "search_results.csv"
      - "dedup_log.csv"
      - "notes/"
      - "bibliography.bib"
      - "search_log.md"
      - "snowball_log.md"
      - "retrieval_manifest.csv"
      - "screening/"
      - "extraction_table.md"
      - "quality_table.md"
      - "synthesis_matrix.md"
      - "literature/literature_map.md"
  - id: "C"
    name: "study-design-analysis-plan"
    sequence_index: 3
    phase_type: "core"
    outputs:
      - "study_design.md"
      - "design/rival_hypotheses.md"
      - "instruments/"
      - "analysis_plan.md"
      - "design/variable_spec.md"
      - "design/robustness_plan.md"
      - "design/dataset_plan.md"
      - "data_management_plan.md"
      - "preregistration.md"
  - id: "D"
    name: "ethics-irb"
    sequence_index: 4
    phase_type: "core"
    outputs:
      - "ethics_irb.md"
      - "compliance/deidentification_plan.md"
  - id: "E"
    name: "evidence-synthesis"
    sequence_index: 5
    phase_type: "core"
    outputs:
      - "meta_analysis_plan.md"
      - "effect_size_table.md"
      - "meta_analysis_results.md"
      - "grade_sof.md"
      - "synthesis_matrix.md"
      - "synthesis.md"
      - "synthesis/publication_bias.md"
  - id: "I"
    name: "research-code-support"
    sequence_index: 6
    phase_type: "support-lane"
    outputs:
      - "analysis/"
      - "data/cleaning_plan.md"
      - "data/merge_plan.md"
      - "code/reproducibility_audit.md"
      - "code/code_specification.md"
      - "code/plan.md"
      - "code/performance_profile.md"
      - "code/code_review.md"
      - "code/container_config/"
      - "code/documentation/"
  - id: "F"
    name: "manuscript-writing"
    sequence_index: 7
    phase_type: "core"
    outputs:
      - "manuscript/outline.md"
      - "manuscript/manuscript.md"
      - "manuscript/claims_evidence_map.md"
      - "manuscript/figures_tables_plan.md"
      - "manuscript/results_interpretation.md"
      - "manuscript/effect_interpretation.md"
      - "manuscript/tables/"
      - "manuscript/figures/"
      - "manuscript/meta_optimization.md"
  - id: "G"
    name: "polish-compliance"
    sequence_index: 8
    phase_type: "core"
    outputs:
      - "reporting_checklist.md"
      - "prisma_checklist.md"
      - "manuscript/claims_evidence_map.md"
      - "compliance/tone_normalization.md"
  - id: "J"
    name: "proofread-de-ai"
    sequence_index: 9
    phase_type: "core"
    outputs:
      - "proofread/ai_detection_report.md"
      - "proofread/humanized_manuscript.md"
      - "proofread/similarity_report.md"
      - "proofread/proofread_checklist.md"
  - id: "H"
    name: "submission-revision"
    sequence_index: 10
    phase_type: "core"
    outputs:
      - "submission/cover_letter.md"
      - "submission/submission_checklist.md"
      - "submission/title_page.md"
      - "submission/highlights.md"
      - "submission/suggested_reviewers.md"
      - "submission/author_contributions_credit.md"
      - "submission/funding_statement.md"
      - "submission/coi_statement.md"
      - "submission/data_availability.md"
      - "submission/ai_disclosure.md"
      - "submission/supplementary_inventory.md"
      - "revision/response_matrix.md"
      - "revision/reviewer_empathy_check.md"
      - "revision/response_letter.md"
      - "revision/peer_review_simulation.md"
      - "revision/fatal_flaw_analysis.md"

