name: Install Check

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  BOOTSTRAP_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
  BOOTSTRAP_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  unix-bootstrap-install:
    name: Unix Bootstrap Install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Local partial bootstrap install
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/home-partial"
          mkdir -p "$HOME"
          export CODEX_HOME="$RUNNER_TEMP/codex-home-partial"
          export CLAUDE_CODE_HOME="$RUNNER_TEMP/claude-home-partial"
          export GEMINI_HOME="$RUNNER_TEMP/gemini-home-partial"
          export ANTIGRAVITY_HOME="$RUNNER_TEMP/antigravity-home-partial"
          project_dir="$RUNNER_TEMP/project-partial"

          bash scripts/bootstrap_research_skill.sh \
            --profile partial \
            --repo "$BOOTSTRAP_REPO" \
            --ref "$BOOTSTRAP_REF" \
            --ref-type branch \
            --project-dir "$project_dir" \
            --overwrite

          test -f "$CODEX_HOME/skills/research-paper-workflow/SKILL.md"
          test -f "$CLAUDE_CODE_HOME/skills/research-paper-workflow/SKILL.md"
          test -f "$GEMINI_HOME/skills/research-paper-workflow/SKILL.md"
          test -f "$project_dir/.agent/workflows/proofread.md"
          test -f "$project_dir/.gemini/research-skills.md"
          test -f "$project_dir/.env"
          test ! -e "$HOME/.local/bin/research-skills"

      - name: Local full bootstrap install
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/home-full"
          mkdir -p "$HOME"
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            export SHELL="/bin/zsh"
          else
            export SHELL="/bin/bash"
          fi
          export CODEX_HOME="$RUNNER_TEMP/codex-home-full"
          export CLAUDE_CODE_HOME="$RUNNER_TEMP/claude-home-full"
          export GEMINI_HOME="$RUNNER_TEMP/gemini-home-full"
          export ANTIGRAVITY_HOME="$RUNNER_TEMP/antigravity-home-full"
          project_dir="$RUNNER_TEMP/project-full"
          cli_dir="$RUNNER_TEMP/bin-full"

          bash scripts/bootstrap_research_skill.sh \
            --profile full \
            --repo "$BOOTSTRAP_REPO" \
            --ref "$BOOTSTRAP_REF" \
            --ref-type branch \
            --project-dir "$project_dir" \
            --cli-dir "$cli_dir" \
            --overwrite

          test -f "$CODEX_HOME/skills/research-paper-workflow/SKILL.md"
          if [[ ! -f "$project_dir/CLAUDE.md" && ! -f "$project_dir/CLAUDE.research-skills.md" ]]; then
            echo "Missing Claude project integration file" >&2
            exit 1
          fi
          test -f "$project_dir/.gemini/agent-profiles.example.json"
          test -f "$cli_dir/research-skills"
          test -x "$cli_dir/research-skills"
          if [[ ! -L "$cli_dir/rsk" && ! -f "$cli_dir/rsk" ]]; then
            echo "Missing CLI alias: $cli_dir/rsk" >&2
            exit 1
          fi
          if [[ ! -L "$cli_dir/rsw" && ! -f "$cli_dir/rsw" ]]; then
            echo "Missing CLI alias: $cli_dir/rsw" >&2
            exit 1
          fi

      - name: Beta bootstrap dry-run
        shell: bash
        run: |
          set -euo pipefail
          output="$(bash scripts/bootstrap_research_skill.sh --profile full --beta --project-dir "$RUNNER_TEMP/project-beta" --target all --dry-run)"
          printf '%s\n' "$output"
          grep -q '<latest-beta>' <<<"$output"

      - name: Remote branch partial bootstrap install
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/home-remote-partial"
          mkdir -p "$HOME"
          export CODEX_HOME="$RUNNER_TEMP/codex-home-remote-partial"
          export CLAUDE_CODE_HOME="$RUNNER_TEMP/claude-home-remote-partial"
          export GEMINI_HOME="$RUNNER_TEMP/gemini-home-remote-partial"
          export ANTIGRAVITY_HOME="$RUNNER_TEMP/antigravity-home-remote-partial"
          project_dir="$RUNNER_TEMP/project-remote-partial"
          raw_script="https://raw.githubusercontent.com/${BOOTSTRAP_REPO}/${BOOTSTRAP_REF}/scripts/bootstrap_research_skill.sh"

          curl -fsSL "$raw_script" | bash -s -- \
            --profile partial \
            --repo "$BOOTSTRAP_REPO" \
            --ref "$BOOTSTRAP_REF" \
            --ref-type branch \
            --project-dir "$project_dir" \
            --overwrite

          test -f "$CODEX_HOME/skills/research-paper-workflow/SKILL.md"
          test -f "$CLAUDE_CODE_HOME/skills/research-paper-workflow/SKILL.md"
          test -f "$GEMINI_HOME/skills/research-paper-workflow/SKILL.md"
          test -f "$project_dir/.agent/workflows/proofread.md"
          test -f "$project_dir/.gemini/research-skills.md"
          test -f "$project_dir/.env"

      - name: Remote branch full bootstrap install
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/home-remote-full"
          mkdir -p "$HOME"
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            export SHELL="/bin/zsh"
          else
            export SHELL="/bin/bash"
          fi
          export CODEX_HOME="$RUNNER_TEMP/codex-home-remote-full"
          export CLAUDE_CODE_HOME="$RUNNER_TEMP/claude-home-remote-full"
          export GEMINI_HOME="$RUNNER_TEMP/gemini-home-remote-full"
          export ANTIGRAVITY_HOME="$RUNNER_TEMP/antigravity-home-remote-full"
          project_dir="$RUNNER_TEMP/project-remote-full"
          cli_dir="$RUNNER_TEMP/bin-remote-full"
          raw_script="https://raw.githubusercontent.com/${BOOTSTRAP_REPO}/${BOOTSTRAP_REF}/scripts/bootstrap_research_skill.sh"

          curl -fsSL "$raw_script" | bash -s -- \
            --profile full \
            --repo "$BOOTSTRAP_REPO" \
            --ref "$BOOTSTRAP_REF" \
            --ref-type branch \
            --project-dir "$project_dir" \
            --cli-dir "$cli_dir" \
            --overwrite

          test -f "$CODEX_HOME/skills/research-paper-workflow/SKILL.md"
          test -f "$project_dir/.agent/workflows/proofread.md"
          test -f "$project_dir/.gemini/agent-profiles.example.json"
          test -f "$cli_dir/research-skills"

  windows-bootstrap-install:
    name: Windows Bootstrap Install
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify PowerShell 7
        shell: pwsh
        run: |
          if ($PSVersionTable.PSVersion.Major -lt 7) {
            throw "Install bootstrap requires PowerShell 7+."
          }

      - name: Local partial bootstrap install
        shell: pwsh
        run: |
          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP "codex-home-partial"
          $env:CLAUDE_CODE_HOME = Join-Path $env:RUNNER_TEMP "claude-home-partial"
          $env:GEMINI_HOME = Join-Path $env:RUNNER_TEMP "gemini-home-partial"
          $env:ANTIGRAVITY_HOME = Join-Path $env:RUNNER_TEMP "antigravity-home-partial"
          $projectDir = Join-Path $env:RUNNER_TEMP "project-partial"

          & .\scripts\bootstrap_research_skill.ps1 `
            -Profile partial `
            -Repo $env:BOOTSTRAP_REPO `
            -Ref $env:BOOTSTRAP_REF `
            -RefType branch `
            -ProjectDir $projectDir `
            -Overwrite

          $checks = @(
            (Join-Path $env:CODEX_HOME "skills\research-paper-workflow\SKILL.md"),
            (Join-Path $env:CLAUDE_CODE_HOME "skills\research-paper-workflow\SKILL.md"),
            (Join-Path $env:GEMINI_HOME "skills\research-paper-workflow\SKILL.md"),
            (Join-Path $projectDir ".agent\workflows\proofread.md"),
            (Join-Path $projectDir ".gemini\research-skills.md"),
            (Join-Path $projectDir ".env")
          )
          foreach ($path in $checks) {
            if (-not (Test-Path $path)) {
              throw "Missing expected install output: $path"
            }
          }
          if (Test-Path (Join-Path $env:USERPROFILE ".local\bin\research-skills.cmd")) {
            throw "Partial install should not create CLI wrappers by default."
          }

      - name: Local full bootstrap install
        shell: pwsh
        run: |
          $shimDir = Join-Path $env:RUNNER_TEMP "python3-shim"
          New-Item -ItemType Directory -Path $shimDir -Force | Out-Null
          $shimPath = Join-Path $shimDir "python3.cmd"
          Set-Content -Path $shimPath -Value "@echo off`r`npython %*" -Encoding Ascii
          $env:PATH = "$shimDir;$env:PATH"

          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP "codex-home-full"
          $env:CLAUDE_CODE_HOME = Join-Path $env:RUNNER_TEMP "claude-home-full"
          $env:GEMINI_HOME = Join-Path $env:RUNNER_TEMP "gemini-home-full"
          $env:ANTIGRAVITY_HOME = Join-Path $env:RUNNER_TEMP "antigravity-home-full"
          $projectDir = Join-Path $env:RUNNER_TEMP "project-full"
          $cliDir = Join-Path $env:RUNNER_TEMP "bin-full"

          & .\scripts\bootstrap_research_skill.ps1 `
            -Profile full `
            -Repo $env:BOOTSTRAP_REPO `
            -Ref $env:BOOTSTRAP_REF `
            -RefType branch `
            -ProjectDir $projectDir `
            -CliDir $cliDir `
            -Overwrite

          $checks = @(
            (Join-Path $env:CODEX_HOME "skills\research-paper-workflow\SKILL.md"),
            (Join-Path $projectDir ".agent\workflows\proofread.md"),
            (Join-Path $projectDir ".gemini\agent-profiles.example.json"),
            (Join-Path $cliDir "research-skills.cmd"),
            (Join-Path $cliDir "rsk.cmd"),
            (Join-Path $cliDir "rsw.cmd")
          )
          foreach ($path in $checks) {
            if (-not (Test-Path $path)) {
              throw "Missing expected install output: $path"
            }
          }

      - name: Beta bootstrap dry-run
        shell: pwsh
        run: |
          $output = & .\scripts\bootstrap_research_skill.ps1 `
            -Beta `
            -Profile full `
            -ProjectDir (Join-Path $env:RUNNER_TEMP "project-beta") `
            -Target all `
            -DryRun | Out-String
          $output
          if ($output -notmatch "v\d+\.\d+\.\d+-beta\.\d+|<latest-beta>") {
            throw "Expected beta bootstrap output to mention a prerelease ref."
          }

      - name: Remote branch partial bootstrap install
        shell: pwsh
        run: |
          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP "codex-home-remote-partial"
          $env:CLAUDE_CODE_HOME = Join-Path $env:RUNNER_TEMP "claude-home-remote-partial"
          $env:GEMINI_HOME = Join-Path $env:RUNNER_TEMP "gemini-home-remote-partial"
          $env:ANTIGRAVITY_HOME = Join-Path $env:RUNNER_TEMP "antigravity-home-remote-partial"
          $projectDir = Join-Path $env:RUNNER_TEMP "project-remote-partial"
          $rawScript = "https://raw.githubusercontent.com/$env:BOOTSTRAP_REPO/$env:BOOTSTRAP_REF/scripts/bootstrap_research_skill.ps1"
          Invoke-WebRequest $rawScript -OutFile .\bootstrap_remote.ps1

          & .\bootstrap_remote.ps1 `
            -Profile partial `
            -Repo $env:BOOTSTRAP_REPO `
            -Ref $env:BOOTSTRAP_REF `
            -RefType branch `
            -ProjectDir $projectDir `
            -Overwrite

          $checks = @(
            (Join-Path $env:CODEX_HOME "skills\research-paper-workflow\SKILL.md"),
            (Join-Path $env:CLAUDE_CODE_HOME "skills\research-paper-workflow\SKILL.md"),
            (Join-Path $env:GEMINI_HOME "skills\research-paper-workflow\SKILL.md"),
            (Join-Path $projectDir ".agent\workflows\proofread.md"),
            (Join-Path $projectDir ".gemini\research-skills.md"),
            (Join-Path $projectDir ".env")
          )
          foreach ($path in $checks) {
            if (-not (Test-Path $path)) {
              throw "Missing expected install output: $path"
            }
          }

      - name: Remote branch full bootstrap install
        shell: pwsh
        run: |
          $shimDir = Join-Path $env:RUNNER_TEMP "python3-shim-remote"
          New-Item -ItemType Directory -Path $shimDir -Force | Out-Null
          $shimPath = Join-Path $shimDir "python3.cmd"
          Set-Content -Path $shimPath -Value "@echo off`r`npython %*" -Encoding Ascii
          $env:PATH = "$shimDir;$env:PATH"

          $env:CODEX_HOME = Join-Path $env:RUNNER_TEMP "codex-home-remote-full"
          $env:CLAUDE_CODE_HOME = Join-Path $env:RUNNER_TEMP "claude-home-remote-full"
          $env:GEMINI_HOME = Join-Path $env:RUNNER_TEMP "gemini-home-remote-full"
          $env:ANTIGRAVITY_HOME = Join-Path $env:RUNNER_TEMP "antigravity-home-remote-full"
          $projectDir = Join-Path $env:RUNNER_TEMP "project-remote-full"
          $cliDir = Join-Path $env:RUNNER_TEMP "bin-remote-full"
          $rawScript = "https://raw.githubusercontent.com/$env:BOOTSTRAP_REPO/$env:BOOTSTRAP_REF/scripts/bootstrap_research_skill.ps1"
          Invoke-WebRequest $rawScript -OutFile .\bootstrap_remote.ps1

          & .\bootstrap_remote.ps1 `
            -Profile full `
            -Repo $env:BOOTSTRAP_REPO `
            -Ref $env:BOOTSTRAP_REF `
            -RefType branch `
            -ProjectDir $projectDir `
            -CliDir $cliDir `
            -Overwrite

          $checks = @(
            (Join-Path $env:CODEX_HOME "skills\research-paper-workflow\SKILL.md"),
            (Join-Path $projectDir ".agent\workflows\proofread.md"),
            (Join-Path $projectDir ".gemini\agent-profiles.example.json"),
            (Join-Path $cliDir "research-skills.cmd")
          )
          foreach ($path in $checks) {
            if (-not (Test-Path $path)) {
              throw "Missing expected install output: $path"
            }
          }
