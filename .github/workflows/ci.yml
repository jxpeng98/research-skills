name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile critical modules
        run: |
          python -m py_compile \
            bridges/base_bridge.py \
            bridges/orchestrator.py \
            scripts/validate_research_standard.py \
            tests/test_orchestrator_workflows.py

      - name: Run standard validator (strict)
        run: python scripts/validate_research_standard.py --strict

      - name: Run orchestrator workflow tests
        run: python -m unittest tests.test_orchestrator_workflows -v

      - name: Run beta smoke checks
        run: ./scripts/run_beta_smoke.sh
