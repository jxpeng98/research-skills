contract_version: "1.0.0"
name: "research-workflow-contract"
scope: "cross-model academic paper workflow"

artifacts:
  root: "RESEARCH/[topic]/"
  required_core:
    - "protocol.md"
    - "framing/research_question.md"
    - "framing/contribution_statement.md"
    - "manuscript/manuscript.md"
    - "framing/hypothesis.md"
    - "framing/venue_analysis.md"
    - "theoretical_framework.md"
    - "gap_analysis.md"
    - "search_strategy.md"
    - "literature/concept_extraction.md"
    - "literature/literature_map.md"
    - "notes/"
    - "bibliography.bib"
    - "search_log.md"
    - "search_results.csv"
    - "screening/title_abstract.md"
    - "screening/full_text.md"
    - "screening/prisma_flow.md"
    - "extraction_table.md"
    - "quality_table.md"
    - "synthesis_matrix.md"
    - "synthesis.md"
    - "meta_analysis_plan.md"
    - "effect_size_table.md"
    - "meta_analysis_results.md"
    - "study_design.md"
    - "design/rival_hypotheses.md"
    - "analysis_plan.md"
    - "design/robustness_plan.md"
    - "data_management_plan.md"
    - "ethics_irb.md"
    - "compliance/deidentification_plan.md"
    - "reporting_checklist.md"
    - "submission/cover_letter.md"
    - "submission/submission_checklist.md"
    - "submission/title_page.md"
    - "submission/highlights.md"
    - "submission/suggested_reviewers.md"
    - "submission/author_contributions_credit.md"
    - "submission/funding_statement.md"
    - "submission/coi_statement.md"
    - "submission/data_availability.md"
    - "submission/ai_disclosure.md"
    - "submission/supplementary_inventory.md"
    - "revision/response_matrix.md"
    - "revision/response_letter.md"

paper_types:
  - id: "empirical"
    focus: "design, data, methods, results, validity"
  - id: "systematic-review"
    focus: "PRISMA search-screen-extract-synthesize-report"
  - id: "methods"
    focus: "new method + validation + comparative evidence"
  - id: "theory"
    focus: "constructs, propositions, conceptual contribution"

stages:
  - id: "A"
    name: "framing-positioning"
    outputs:
      - "framing/research_question.md"
      - "framing/hypothesis.md"
      - "framing/contribution_statement.md"
      - "theoretical_framework.md"
      - "gap_analysis.md"
      - "framing/venue_analysis.md"
  - id: "B"
    name: "literature-related-work"
    outputs:
      - "protocol.md"
      - "search_strategy.md"
      - "literature/concept_extraction.md"
      - "search_results.csv"
      - "notes/"
      - "bibliography.bib"
      - "search_log.md"
      - "snowball_log.md"
      - "screening/"
      - "extraction_table.md"
      - "quality_table.md"
      - "synthesis_matrix.md"
      - "literature/literature_map.md"
  - id: "C"
    name: "study-design-analysis-plan"
    outputs:
      - "study_design.md"
      - "design/rival_hypotheses.md"
      - "instruments/"
      - "analysis_plan.md"
      - "design/robustness_plan.md"
      - "data_management_plan.md"
      - "preregistration.md"
  - id: "D"
    name: "ethics-irb"
    outputs:
      - "ethics_irb.md"
      - "compliance/deidentification_plan.md"
  - id: "E"
    name: "evidence-synthesis"
    outputs:
      - "meta_analysis_plan.md"
      - "effect_size_table.md"
      - "meta_analysis_results.md"
      - "grade_sof.md"
      - "synthesis_matrix.md"
      - "synthesis.md"
      - "synthesis/publication_bias.md"
  - id: "F"
    name: "manuscript-writing"
    outputs:
      - "manuscript/outline.md"
      - "manuscript/manuscript.md"
      - "manuscript/claims_evidence_map.md"
      - "manuscript/figures_tables_plan.md"
      - "manuscript/meta_optimization.md"
  - id: "G"
    name: "polish-compliance"
    outputs:
      - "reporting_checklist.md"
      - "prisma_checklist.md"
      - "manuscript/claims_evidence_map.md"
      - "compliance/tone_normalization.md"
  - id: "H"
    name: "submission-revision"
    outputs:
      - "submission/cover_letter.md"
      - "submission/submission_checklist.md"
      - "submission/title_page.md"
      - "submission/highlights.md"
      - "submission/suggested_reviewers.md"
      - "submission/author_contributions_credit.md"
      - "submission/funding_statement.md"
      - "submission/coi_statement.md"
      - "submission/data_availability.md"
      - "submission/ai_disclosure.md"
      - "submission/supplementary_inventory.md"
      - "revision/response_matrix.md"
      - "revision/reviewer_empathy_check.md"
      - "revision/response_letter.md"
      - "revision/peer_review_simulation.md"
      - "revision/fatal_flaw_analysis.md"
  - id: "I"
    name: "research-code-support"
    outputs:
      - "analysis/"
      - "code/reproducibility_audit.md"
      - "code/code_specification.md"
      - "code/plan.md"
      - "code/performance_profile.md"
      - "code/code_review.md"
      - "code/container_config/"
      - "code/documentation/"

