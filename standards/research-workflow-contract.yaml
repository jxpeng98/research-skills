  I3:
    stage: "I"
    title: "data-pipeline"
    outputs:
      - "analysis/"
  I4:
    stage: "I"
    title: "reproducibility-audit"
    outputs:
      - "code/reproducibility_audit.md"

platform_mapping:
  claude_code:
    A3: "/build-framework"
    A4: "/find-gap"
    B1: "/lit-review"
    B2: "/paper-read"
    B4: "/academic-write related-work [topic]"
    C1: "/study-design"
    D1: "/ethics-check"
    E1: "/synthesize"
    F2: "/academic-write [section] [topic]"
    F3: "/paper-write"
    G2: "/prisma-checker via /lit-review outputs"
    H1: "/submission-prep"
    H2: "/rebuttal"
    I1: "/code-build"
  codex:
    entry: "$research-paper-workflow"
    task_selector: "Use Task ID from task_catalog (for example F3 or G1)"
  gemini:
    prompt_pattern: "Task {ID} on RESEARCH/[topic] using outputs defined in contract_version 1.0.0"

quality_gates:
  - id: "Q1"
    name: "question-to-method alignment"
    rule: "RQs in framing match methods and outcomes in manuscript"
  - id: "Q2"
    name: "claim-evidence traceability"
    rule: "All major claims mapped to evidence and citations"
  - id: "Q3"
    name: "reporting completeness"
    rule: "Use reporting-checker or prisma-checker before submission"
  - id: "Q4"
    name: "reproducibility baseline"
    rule: "Analysis decisions and artifact paths are documented"

