    outputs:
      - "synthesis/publication_bias.md"
  E4:
    stage: "E"
    title: "certainty-grading"
    outputs:
      - "grade_sof.md"
  E5:
    stage: "E"
    title: "integrated-synthesis"
    outputs:
      - "synthesis.md"
  F1:
    stage: "F"
    title: "manuscript-outline"
    outputs:
      - "manuscript/outline.md"
  F2:
    stage: "F"
    title: "single-section-writing"
    outputs:
      - "manuscript/manuscript.md"
  F3:
    stage: "F"
    title: "full-manuscript-draft"
    outputs:
