    display_name_zh: "研究设计"
    when_to_use_zh: "当研究问题已清楚，需要搭建设计、测量和分析方案时使用。"
    inputs: [RQSet, TheoreticalFramework]
    outputs: [DesignSpec, AnalysisPlan, DataManagementPlan, Instruments, Preregistration]
    tags: [design, sampling, measures, analysis-plan, preregistration]
    depends_on: [question-refiner]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, metadata-registry]
    domain_aware: true

