# ─────────────────────────────────────────────
# Scoring Rubric: Skill Output Quality
# ─────────────────────────────────────────────
# Applied by eval runner to assess skill output quality

rubric_id: skill-output-quality
version: "1.1.0"

dimensions:
  - name: completeness
    weight: 0.20
    description: "All required sections and fields are present"
    levels:
      - score: 1
        label: "Missing"
        criteria: ">50% of required sections absent"
      - score: 2
        label: "Partial"
        criteria: "25-50% of required sections absent"
      - score: 3
        label: "Mostly complete"
        criteria: "<25% absent, no critical sections missing"
      - score: 4
        label: "Complete"
        criteria: "All required sections present and populated"

  - name: accuracy
    weight: 0.20
    description: "Content is factually correct and methodologically sound"
    levels:
      - score: 1
        label: "Major errors"
        criteria: "Fundamental methodological or factual errors"
      - score: 2
        label: "Minor errors"
        criteria: "Non-critical inaccuracies or imprecisions"
      - score: 3
        label: "Mostly accurate"
        criteria: "Substantively correct with minor issues"
      - score: 4
        label: "Accurate"
        criteria: "Factually and methodologically sound throughout"

  - name: domain_appropriateness
    weight: 0.15
    description: "Output follows domain conventions and uses appropriate methods/tools"
    levels:
      - score: 1
        label: "Wrong domain"
        criteria: "Uses methods/tools inappropriate for the domain"
      - score: 2
        label: "Generic"
        criteria: "Correct but doesn't leverage domain profile"
      - score: 3
        label: "Domain-aware"
        criteria: "Uses domain-appropriate methods and terminology"
      - score: 4
        label: "Expert-level"
        criteria: "Demonstrates deep domain expertise in choices"

  - name: analytical_depth
    weight: 0.20
    description: "Output moves beyond surface description into mechanism, contrast, boundaries, and defensible implications"
    levels:
      - score: 1
        label: "Surface-only"
        criteria: "Mostly paraphrases facts, themes, or results without interpretation"
      - score: 2
        label: "Shallow interpretation"
        criteria: "Adds some interpretation, but remains generic or unsupported"
      - score: 3
        label: "Analytical"
        criteria: "Explains mechanisms, tensions, or boundary conditions with mostly defensible reasoning"
      - score: 4
        label: "Deeply analytical"
        criteria: "Integrates mechanism, rival explanations, limits, and implications without overclaiming"

  - name: actionability
    weight: 0.15
    description: "Output can be directly used by downstream skills or researcher"
    levels:
      - score: 1
        label: "Not actionable"
        criteria: "Vague or abstract, requires complete rework"
      - score: 2
        label: "Partially actionable"
        criteria: "Some sections usable, others need clarification"
      - score: 3
        label: "Mostly actionable"
        criteria: "Can be used with minor modifications"
      - score: 4
        label: "Fully actionable"
        criteria: "Ready for direct use by next pipeline step"

  - name: formatting
    weight: 0.10
    description: "Follows the skill's output contract format"
    levels:
      - score: 1
        label: "Non-compliant"
        criteria: "Does not follow expected output format"
      - score: 2
        label: "Partially compliant"
        criteria: "General structure present but formatting inconsistent"
      - score: 3
        label: "Mostly compliant"
        criteria: "Follows format with minor deviations"
      - score: 4
        label: "Fully compliant"
        criteria: "Exact match to skill output contract"
