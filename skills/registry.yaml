# ─────────────────────────────────────────────────────────────
# Research Skills Registry — Machine-readable index of all skills
# ─────────────────────────────────────────────────────────────
# Validates against: schemas/skill.schema.json
# Artifact type vocabulary: schemas/artifact-types.yaml
# ─────────────────────────────────────────────────────────────

skills:
  # ══════════════════════════════════════════════════════════
  # A_framing — Research question, theory, positioning
  # ══════════════════════════════════════════════════════════
  - id: question-refiner
    stage: A_framing
    version: "0.4.0"
    file: skills/A_framing/question-refiner.md
    canonical: true
    summary: "Transform vague topics into structured RQs via PICO/PEO + FINER evaluation."
    display_name: "Question Refiner"
    when_to_use: "Use when you need to transform vague topics into structured rqs via pico/peo + finer evaluation."
    summary_zh: "将模糊选题转成经过 PICO/PEO + FINER 评估的结构化研究问题。"
    display_name_zh: "研究问题精炼"
    when_to_use_zh: "当选题还模糊、范围过大或研究问题不可执行时使用。"
    inputs: [UserQuery]
    outputs: [RQSet]
    tags: [framing, research-question, PICO, PEO, FINER]
    depends_on: []
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: false
  - id: contribution-crafter
    stage: A_framing
    version: "0.4.0"
    file: skills/A_framing/contribution-crafter.md
    canonical: true
    summary: "Draft a compelling contribution statement highlighting theoretical, methodological, and empirical novelty."
    display_name: "Contribution Crafter"
    when_to_use: "When framing the pitch for a manuscript introduction"
    summary_zh: "提炼突显理论、方法与实证新颖性的贡献声明。"
    display_name_zh: "贡献提炼"
    when_to_use_zh: "当引言需要点明主要贡献，或需要为文章定位和强调创新点时使用。"
    inputs: [RQSet, GapAnalysis]
    outputs: [ContributionStatement]
    tags: [contribution, novelty, framing, positioning]
    depends_on: [question-refiner, gap-analyzer]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: true

  - id: hypothesis-generator
    stage: A_framing
    version: "0.4.0"
    file: skills/A_framing/hypothesis-generator.md
    canonical: true
    summary: "Translate RQs into testable hypotheses with mechanisms and boundary conditions."
    display_name: "Hypothesis Generator"
    when_to_use: "Use when you need to translate rqs into testable hypotheses with mechanisms and boundary conditions."
    summary_zh: "把研究问题转成带机制和边界条件的可检验假设。"
    display_name_zh: "假设生成"
    when_to_use_zh: "当你需要把研究问题转成可检验假设或 propositions 时使用。"
    inputs: [RQSet, TheoreticalFramework]
    outputs: [HypothesisSet]
    tags: [framing, hypothesis, propositions, mechanisms]
    depends_on: [question-refiner]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: false

  - id: theory-mapper
    stage: A_framing
    version: "0.4.0"
    file: skills/A_framing/theory-mapper.md
    canonical: true
    summary: "Map theoretical concepts, relationships, and frameworks with Mermaid diagrams."
    display_name: "Theory Mapper"
    when_to_use: "Use when you need to map theoretical concepts, relationships, and frameworks with mermaid diagrams."
    summary_zh: "用 Mermaid 梳理理论概念、关系和框架。"
    display_name_zh: "理论映射"
    when_to_use_zh: "当你需要概念图、理论框架或机制关系图时使用。"
    inputs: [RQSet, LiteratureCorpus]
    outputs: [TheoreticalFramework]
    tags: [framing, theory, constructs, conceptual-model, mermaid]
    depends_on: [question-refiner, academic-searcher]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search]
    domain_aware: false

  - id: gap-analyzer
    stage: A_framing
    version: "0.4.0"
    file: skills/A_framing/gap-analyzer.md
    canonical: true
    summary: "Identify and categorize research gaps using 5-type taxonomy with FINER prioritization."
    display_name: "Gap Analyzer"
    when_to_use: "Use when you need to identify and categorize research gaps using 5-type taxonomy with finer prioritization."
    summary_zh: "用五类 gap taxonomy 与 FINER 优先级识别并分类研究空白。"
    display_name_zh: "研究空白分析"
    when_to_use_zh: "当你需要从已有文献中证明 novelty 和贡献空间时使用。"
    inputs: [LiteratureCorpus, SearchResults]
    outputs: [GapAnalysis]
    tags: [framing, gap-analysis, positioning, FINER]
    depends_on: [academic-searcher]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search]
    domain_aware: false

  - id: venue-analyzer
    stage: A_framing
    version: "0.4.0"
    file: skills/A_framing/venue-analyzer.md
    canonical: true
    summary: "Analyze venue fit, formatting constraints, and reviewer expectations."
    display_name: "Venue Analyzer"
    when_to_use: "At the very start of a project (affects RQ scope, methods choice, page limits)"
    summary_zh: "分析目标期刊或会议的匹配度、格式约束和审稿预期。"
    display_name_zh: "期刊匹配分析"
    when_to_use_zh: "当研究方向已较清楚，需要判断目标期刊或会议匹配度时使用。"
    inputs: [UserQuery, RQSet]
    outputs: [VenueAnalysis]
    tags: [framing, venue, journal-selection, formatting]
    depends_on: [question-refiner]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search]
    domain_aware: true

  # ══════════════════════════════════════════════════════════
  # B_literature — Search, screen, extract, cite
  # ══════════════════════════════════════════════════════════
  - id: academic-searcher
    stage: B_literature
    version: "0.4.0"
    file: skills/B_literature/academic-searcher.md
    canonical: true
    summary: "Own query design, provider-backed retrieval, and deduplicated search outputs as one top-level search skill."
    display_name: "Academic Searcher"
    when_to_use: "Use when you need to own query design, provider-backed retrieval, and deduplicated search outputs as one top-level search skill."
    summary_zh: "统一负责检索式设计、数据库检索和去重后的搜索产物。"
    display_name_zh: "学术检索"
    when_to_use_zh: "当你需要可复现的检索式、数据库搜索和 search log 时使用。"
    inputs: [RQSet, SearchQueryPlan]
    outputs: [SearchQueryPlan, SearchResults, SearchLog]
    tags: [literature, search, databases, API, reproducibility]
    depends_on: [question-refiner]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search, fulltext-retrieval]
    domain_aware: false

  - id: paper-screener
    stage: B_literature
    version: "0.4.0"
    file: skills/B_literature/paper-screener.md
    canonical: true
    summary: "Two-stage PRISMA-compliant systematic screening with decision logging."
    display_name: "Paper Screener"
    when_to_use: "Use when you need to two-stage prisma-compliant systematic screening with decision logging."
    summary_zh: "按 PRISMA 做两阶段系统筛选，并记录每一步决策依据。"
    display_name_zh: "文献筛选"
    when_to_use_zh: "当你需要按纳入排除标准筛选文献并留下决策记录时使用。"
    inputs: [SearchResults, RQSet]
    outputs: [ScreeningDecisionLog, PRISMAFlowData]
    tags: [literature, screening, PRISMA, inclusion-exclusion]
    depends_on: [academic-searcher]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, screening-tracker]
    domain_aware: false

  - id: paper-extractor
    stage: B_literature
    version: "0.4.0"
    file: skills/B_literature/paper-extractor.md
    canonical: true
    summary: "Extract structured theory, method, data, findings, and limitation slots into notes and rollups."
    display_name: "Paper Extractor"
    when_to_use: "Use when you need to extract structured theory, method, data, findings, and limitation slots into notes and rollups."
    summary_zh: "将论文中的理论、方法、数据、发现和局限提取为结构化笔记与汇总。"
    display_name_zh: "论文提取"
    when_to_use_zh: "当你需要把入选论文转成结构化笔记和 extraction table 时使用。"
    inputs: [ScreeningDecisionLog]
    outputs: [ExtractionTable, PaperNotes]
    tags: [literature, extraction, data-collection, structured-notes]
    depends_on: [paper-screener]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, extraction-store]
    domain_aware: false

  - id: citation-snowballer
    stage: B_literature
    version: "0.4.0"
    file: skills/B_literature/citation-snowballer.md
    canonical: true
    summary: "Forward/backward citation tracing to expand corpus and find seminal works."
    display_name: "Citation Snowballer"
    when_to_use: "Use when you need to forward/backward citation tracing to expand corpus and find seminal works."
    summary_zh: "通过前向与后向引文追踪扩展语料，并发现奠基性文献。"
    display_name_zh: "引文滚雪球"
    when_to_use_zh: "当已有种子文献但覆盖还不够时使用。"
    inputs: [SearchResults]
    outputs: [SnowballLog]
    tags: [literature, citations, snowballing, forward-backward]
    depends_on: [academic-searcher]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search, citation-graph]
    domain_aware: false

  - id: fulltext-fetcher
    stage: B_literature
    version: "0.4.0"
    file: skills/B_literature/fulltext-fetcher.md
    canonical: true
    summary: "Retrieve full-text PDFs via OA channels with PRISMA-compliant status tracking."
    display_name: "Full-text Fetcher"
    when_to_use: "Use when you need to retrieve full-text pdfs via oa channels with prisma-compliant status tracking."
    summary_zh: "通过开放获取渠道获取全文 PDF，并记录符合 PRISMA 的状态轨迹。"
    display_name_zh: "全文获取"
    when_to_use_zh: "当你已找到候选论文但缺少全文时使用。"
    inputs: [ScreeningDecisionLog]
    outputs: [FullTextStatus]
    tags: [literature, fulltext, open-access, retrieval, PRISMA]
    depends_on: [paper-screener]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, fulltext-retrieval]
    domain_aware: false

  - id: citation-formatter
    stage: B_literature
    version: "0.4.0"
    file: skills/B_literature/citation-formatter.md
    canonical: true
    summary: "Format citations in APA/MLA/Chicago/IEEE/BibTeX with consistent citekeys."
    display_name: "Citation Formatter"
    when_to_use: "Use when you need to format citations in apa/mla/chicago/ieee/bibtex with consistent citekeys."
    summary_zh: "用统一 citekey 生成 APA、MLA、Chicago、IEEE 与 BibTeX 引文。"
    display_name_zh: "引文格式化"
    when_to_use_zh: "当写作前需要统一 bibliography、citekey 和引文格式时使用。"
    inputs: [PaperNotes]
    outputs: [Bibliography]
    tags: [literature, citations, BibTeX, APA, formatting]
    depends_on: [paper-extractor]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, metadata-registry]
    domain_aware: false

  - id: concept-extractor
    stage: B_literature
    version: "0.4.0"
    file: skills/B_literature/concept-extractor.md
    canonical: true
    summary: "Expand search concepts with controlled vocabulary and Boolean query drafting."
    display_name: "Concept Extractor"
    when_to_use: "After research questions (A1) are drafted but before search execution (B1)"
    summary_zh: "借助 controlled vocabulary 扩展检索概念，并起草 Boolean 检索式。"
    display_name_zh: "检索概念提取"
    when_to_use_zh: "当检索概念不稳定，需要补 controlled vocabulary 和 Boolean 术语时使用。"
    inputs: [RQSet, PaperNotes]
    outputs: [ConceptMap]
    tags: [literature, keywords, concepts, boolean-query, controlled-vocabulary]
    depends_on: [question-refiner]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search]
    domain_aware: true

  - id: literature-mapper
    stage: B_literature
    version: "0.4.0"
    file: skills/B_literature/literature-mapper.md
    canonical: true
    summary: "Build literature taxonomy with mechanism-based cluster labels and open problems."
    display_name: "Literature Mapper"
    when_to_use: "After paper extraction (B2) when you have ≥15 papers with structured notes"
    summary_zh: "用机制导向的簇标签和开放问题构建文献地图。"
    display_name_zh: "文献地图"
    when_to_use_zh: "当你需要重组文献流派、机制簇和开放问题时使用。"
    inputs: [ExtractionTable]
    outputs: [LiteratureMap]
    tags: [literature, taxonomy, mapping, related-work, clustering]
    depends_on: [paper-extractor]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: false

  - id: reference-manager-bridge
    stage: B_literature
    version: "0.4.0"
    file: skills/B_literature/reference-manager-bridge.md
    canonical: true
    summary: "Export/import references between research system and Zotero/Mendeley/EndNote."
    display_name: "Reference Manager Bridge"
    when_to_use: "Use when you need to export/import references between research system and zotero/mendeley/endnote."
    summary_zh: "在研究系统与 Zotero、Mendeley、EndNote 之间导入导出文献。"
    display_name_zh: "文献管理器桥接"
    when_to_use_zh: "当你需要与 Zotero、Mendeley 或 EndNote 双向交换文献时使用。"
    inputs: [Bibliography, PaperNotes]
    outputs: [Bibliography, RISExport, CSLJSONExport]
    tags: [literature, references, Zotero, Mendeley, EndNote, BibTeX, RIS]
    depends_on: [citation-formatter]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, metadata-registry]
    domain_aware: false

  # ══════════════════════════════════════════════════════════
  # C_design — Study design, analysis planning, robustness
  # ══════════════════════════════════════════════════════════
  - id: study-designer
    stage: C_design
    version: "0.4.0"
    file: skills/C_design/study-designer.md
