# ─────────────────────────────────────────────────────────────
# Research Skills Registry — Machine-readable index of all skills
# ─────────────────────────────────────────────────────────────
# Validates against: schemas/skill.schema.json
# Artifact type vocabulary: schemas/artifact-types.yaml
# ─────────────────────────────────────────────────────────────

skills:
  # ══════════════════════════════════════════════════════════
  # A_framing — Research question, theory, positioning
  # ══════════════════════════════════════════════════════════
  - id: question-refiner
    stage: A_framing
    version: "0.4.0-beta.6"
    file: skills/A_framing/question-refiner.md
    summary: "Transform vague topics into structured RQs via PICO/PEO + FINER evaluation."
    summary_zh: "将模糊选题转成经过 PICO/PEO + FINER 评估的结构化研究问题。"
    display_name_zh: "研究问题精炼"
    when_to_use_zh: "当选题还模糊、范围过大或研究问题不可执行时使用。"
    inputs: [UserQuery]
    outputs: [RQSet]
    tags: [framing, research-question, PICO, PEO, FINER]
    depends_on: []
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: false

  - id: hypothesis-generator
    stage: A_framing
    version: "0.4.0-beta.6"
    file: skills/A_framing/hypothesis-generator.md
    summary: "Translate RQs into testable hypotheses with mechanisms and boundary conditions."
    summary_zh: "把研究问题转成带机制和边界条件的可检验假设。"
    display_name_zh: "假设生成"
    when_to_use_zh: "当你需要把研究问题转成可检验假设或 propositions 时使用。"
    inputs: [RQSet, TheoreticalFramework]
    outputs: [HypothesisSet]
    tags: [framing, hypothesis, propositions, mechanisms]
    depends_on: [question-refiner]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: false

  - id: theory-mapper
    stage: A_framing
    version: "0.4.0-beta.6"
    file: skills/A_framing/theory-mapper.md
    summary: "Map theoretical concepts, relationships, and frameworks with Mermaid diagrams."
    summary_zh: "用 Mermaid 梳理理论概念、关系和框架。"
    display_name_zh: "理论映射"
    when_to_use_zh: "当你需要概念图、理论框架或机制关系图时使用。"
    inputs: [RQSet, LiteratureCorpus]
    outputs: [TheoreticalFramework]
    tags: [framing, theory, constructs, conceptual-model, mermaid]
    depends_on: [question-refiner, academic-searcher]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search]
    domain_aware: false

  - id: gap-analyzer
    stage: A_framing
    version: "0.4.0-beta.6"
    file: skills/A_framing/gap-analyzer.md
    summary: "Identify and categorize research gaps using 5-type taxonomy with FINER prioritization."
    summary_zh: "用五类 gap taxonomy 与 FINER 优先级识别并分类研究空白。"
    display_name_zh: "研究空白分析"
    when_to_use_zh: "当你需要从已有文献中证明 novelty 和贡献空间时使用。"
    inputs: [LiteratureCorpus, SearchResults]
    outputs: [GapAnalysis]
    tags: [framing, gap-analysis, positioning, FINER]
    depends_on: [academic-searcher]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search]
    domain_aware: false

  - id: venue-analyzer
    stage: A_framing
    version: "0.4.0-beta.6"
    file: skills/A_framing/venue-analyzer.md
    summary: "Analyze venue fit, formatting constraints, and reviewer expectations."
    summary_zh: "分析目标期刊或会议的匹配度、格式约束和审稿预期。"
    display_name_zh: "期刊匹配分析"
    when_to_use_zh: "当研究方向已较清楚，需要判断目标期刊或会议匹配度时使用。"
    inputs: [UserQuery, RQSet]
    outputs: [VenueAnalysis]
    tags: [framing, venue, journal-selection, formatting]
    depends_on: [question-refiner]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search]
    domain_aware: true

  # ══════════════════════════════════════════════════════════
  # B_literature — Search, screen, extract, cite
  # ══════════════════════════════════════════════════════════
  - id: academic-searcher
    stage: B_literature
    version: "0.4.0-beta.6"
    file: skills/B_literature/academic-searcher.md
    summary: "Own query design, provider-backed retrieval, and deduplicated search outputs as one top-level search skill."
    summary_zh: "统一负责检索式设计、数据库检索和去重后的搜索产物。"
    display_name_zh: "学术检索"
    when_to_use_zh: "当你需要可复现的检索式、数据库搜索和 search log 时使用。"
    inputs: [RQSet, SearchQueryPlan]
    outputs: [SearchQueryPlan, SearchResults, SearchLog]
    tags: [literature, search, databases, API, reproducibility]
    depends_on: [question-refiner]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search, fulltext-retrieval]
    domain_aware: false

  - id: paper-screener
    stage: B_literature
    version: "0.4.0-beta.6"
    file: skills/B_literature/paper-screener.md
    summary: "Two-stage PRISMA-compliant systematic screening with decision logging."
    summary_zh: "按 PRISMA 做两阶段系统筛选，并记录每一步决策依据。"
    display_name_zh: "文献筛选"
    when_to_use_zh: "当你需要按纳入排除标准筛选文献并留下决策记录时使用。"
    inputs: [SearchResults, RQSet]
    outputs: [ScreeningDecisionLog, PRISMAFlowData]
    tags: [literature, screening, PRISMA, inclusion-exclusion]
    depends_on: [academic-searcher]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, screening-tracker]
    domain_aware: false

  - id: paper-extractor
    stage: B_literature
    version: "0.4.0-beta.6"
    file: skills/B_literature/paper-extractor.md
    summary: "Extract structured theory, method, data, findings, and limitation slots into notes and rollups."
    summary_zh: "将论文中的理论、方法、数据、发现和局限提取为结构化笔记与汇总。"
    display_name_zh: "论文提取"
    when_to_use_zh: "当你需要把入选论文转成结构化笔记和 extraction table 时使用。"
    inputs: [ScreeningDecisionLog]
    outputs: [ExtractionTable, PaperNotes]
    tags: [literature, extraction, data-collection, structured-notes]
    depends_on: [paper-screener]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, extraction-store]
    domain_aware: false

  - id: citation-snowballer
    stage: B_literature
    version: "0.4.0-beta.6"
    file: skills/B_literature/citation-snowballer.md
    summary: "Forward/backward citation tracing to expand corpus and find seminal works."
    summary_zh: "通过前向与后向引文追踪扩展语料，并发现奠基性文献。"
    display_name_zh: "引文滚雪球"
    when_to_use_zh: "当已有种子文献但覆盖还不够时使用。"
    inputs: [SearchResults]
    outputs: [SnowballLog]
    tags: [literature, citations, snowballing, forward-backward]
    depends_on: [academic-searcher]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search, citation-graph]
    domain_aware: false

  - id: fulltext-fetcher
    stage: B_literature
    version: "0.4.0-beta.6"
    file: skills/B_literature/fulltext-fetcher.md
    summary: "Retrieve full-text PDFs via OA channels with PRISMA-compliant status tracking."
    summary_zh: "通过开放获取渠道获取全文 PDF，并记录符合 PRISMA 的状态轨迹。"
    display_name_zh: "全文获取"
    when_to_use_zh: "当你已找到候选论文但缺少全文时使用。"
    inputs: [ScreeningDecisionLog]
    outputs: [FullTextStatus]
    tags: [literature, fulltext, open-access, retrieval, PRISMA]
    depends_on: [paper-screener]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, fulltext-retrieval]
    domain_aware: false

  - id: citation-formatter
    stage: B_literature
    version: "0.4.0-beta.6"
    file: skills/B_literature/citation-formatter.md
    summary: "Format citations in APA/MLA/Chicago/IEEE/BibTeX with consistent citekeys."
    summary_zh: "用统一 citekey 生成 APA、MLA、Chicago、IEEE 与 BibTeX 引文。"
    display_name_zh: "引文格式化"
    when_to_use_zh: "当写作前需要统一 bibliography、citekey 和引文格式时使用。"
    inputs: [PaperNotes]
    outputs: [Bibliography]
    tags: [literature, citations, BibTeX, APA, formatting]
    depends_on: [paper-extractor]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, metadata-registry]
    domain_aware: false

  - id: concept-extractor
    stage: B_literature
    version: "0.4.0-beta.6"
    file: skills/B_literature/concept-extractor.md
    summary: "Expand search concepts with controlled vocabulary and Boolean query drafting."
    summary_zh: "借助 controlled vocabulary 扩展检索概念，并起草 Boolean 检索式。"
    display_name_zh: "检索概念提取"
    when_to_use_zh: "当检索概念不稳定，需要补 controlled vocabulary 和 Boolean 术语时使用。"
    inputs: [RQSet, PaperNotes]
    outputs: [ConceptMap]
    tags: [literature, keywords, concepts, boolean-query, controlled-vocabulary]
    depends_on: [question-refiner]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search]
    domain_aware: true

  - id: literature-mapper
    stage: B_literature
    version: "0.4.0-beta.6"
    file: skills/B_literature/literature-mapper.md
    summary: "Build literature taxonomy with mechanism-based cluster labels and open problems."
    summary_zh: "用机制导向的簇标签和开放问题构建文献地图。"
    display_name_zh: "文献地图"
    when_to_use_zh: "当你需要重组文献流派、机制簇和开放问题时使用。"
    inputs: [ExtractionTable]
    outputs: [LiteratureMap]
    tags: [literature, taxonomy, mapping, related-work, clustering]
    depends_on: [paper-extractor]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: false

  - id: reference-manager-bridge
    stage: B_literature
    version: "0.4.0-beta.6"
    file: skills/B_literature/reference-manager-bridge.md
    summary: "Export/import references between research system and Zotero/Mendeley/EndNote."
    summary_zh: "在研究系统与 Zotero、Mendeley、EndNote 之间导入导出文献。"
    display_name_zh: "文献管理器桥接"
    when_to_use_zh: "当你需要与 Zotero、Mendeley 或 EndNote 双向交换文献时使用。"
    inputs: [Bibliography, PaperNotes]
    outputs: [Bibliography, RISExport, CSLJSONExport]
    tags: [literature, references, Zotero, Mendeley, EndNote, BibTeX, RIS]
    depends_on: [citation-formatter]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, metadata-registry]
    domain_aware: false

  # ══════════════════════════════════════════════════════════
  # C_design — Study design, analysis planning, robustness
  # ══════════════════════════════════════════════════════════
  - id: study-designer
    stage: C_design
    version: "0.4.0-beta.6"
    file: skills/C_design/study-designer.md
    summary: "Own study design rationale, measures, analysis summary, and design handoff artifacts in one package."
    summary_zh: "将研究设计依据、测量、分析概要和设计交接产物整合成一个设计包。"
    display_name_zh: "研究设计"
    when_to_use_zh: "当研究问题已清楚，需要搭建设计、测量和分析方案时使用。"
    inputs: [RQSet, TheoreticalFramework]
    outputs: [DesignSpec, AnalysisPlan, DataManagementPlan, Instruments, Preregistration]
    tags: [design, sampling, measures, analysis-plan, preregistration]
    depends_on: [question-refiner]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, metadata-registry]
    domain_aware: true

  - id: rival-hypothesis-designer
    stage: C_design
    version: "0.4.0-beta.6"
    file: skills/C_design/rival-hypothesis-designer.md
    summary: "Construct competing theories and rival explanations to strengthen design."
    summary_zh: "构造竞争性理论和替代解释，强化研究设计。"
    display_name_zh: "竞争解释设计"
    when_to_use_zh: "当你需要主动处理替代解释和 competing theories 时使用。"
    inputs: [DesignSpec, HypothesisSet]
    outputs: [RivalHypotheses]
    tags: [design, rival-hypotheses, threats-to-validity, competing-theories]
    depends_on: [study-designer, hypothesis-generator]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: false

  - id: robustness-planner
    stage: C_design
    version: "0.4.0-beta.6"
    file: skills/C_design/robustness-planner.md
    summary: "Pre-specify robustness checks, sensitivity analysis, and bounds scaling."
    summary_zh: "预先规定稳健性检验、敏感性分析和 bounds scaling。"
    display_name_zh: "稳健性规划"
    when_to_use_zh: "当经验设计需要预先规定稳健性和敏感性分析时使用。"
    inputs: [DesignSpec, AnalysisPlan]
    outputs: [RobustnessPlan]
    tags: [design, robustness, sensitivity-analysis, endogeneity]
    depends_on: [study-designer]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: true

  - id: dataset-finder
    stage: C_design
    version: "0.4.0-beta.6"
    file: skills/C_design/dataset-finder.md
    summary: "Identify feasible datasets, access routes, and coverage risks before implementation."
    summary_zh: "在实施前识别可行数据集、获取路径和覆盖风险。"
    display_name_zh: "数据集搜寻"
    when_to_use_zh: "当你不确定有哪些可行数据源和获取路径时使用。"
    inputs: [RQSet, DesignSpec, AnalysisPlan]
    outputs: [DatasetPlan]
    tags: [design, data, datasets, provenance, feasibility]
    depends_on: [study-designer]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, scholarly-search, metadata-registry]
    domain_aware: true

  - id: variable-constructor
    stage: C_design
    version: "0.4.0-beta.6"
    file: skills/C_design/variable-constructor.md
    summary: "Operationalize constructs into auditable variables, coding rules, and transformations."
    summary_zh: "将构念 operationalize 为可审计变量、编码规则和变换。"
    display_name_zh: "变量构造"
    when_to_use_zh: "当你需要把抽象构念落成可审计变量和编码规则时使用。"
    inputs: [DesignSpec, AnalysisPlan, HypothesisSet, DatasetPlan]
    outputs: [VariableSpec]
    tags: [design, variables, operationalization, coding, measures]
    depends_on: [study-designer]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, metadata-registry]
    domain_aware: true

  # ══════════════════════════════════════════════════════════
  # D_ethics — IRB, privacy, deidentification
  # ══════════════════════════════════════════════════════════
  - id: ethics-irb-helper
    stage: D_ethics
    version: "0.4.0-beta.6"
    file: skills/D_ethics/ethics-irb-helper.md
    summary: "Prepare IRB-ready materials: risk assessment, consent, recruitment, data governance."
    summary_zh: "准备可直接用于 IRB 的风险评估、知情同意、招募和数据治理材料。"
    display_name_zh: "伦理与IRB助手"
    when_to_use_zh: "当研究涉及 IRB、人类受试者或敏感数据时使用。"
    inputs: [DesignSpec]
    outputs: [EthicsPackage]
    tags: [ethics, IRB, consent, privacy, GDPR, compliance]
    depends_on: [study-designer]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: false

  - id: deidentification-planner
    stage: D_ethics
    version: "0.4.0-beta.6"
    file: skills/D_ethics/deidentification-planner.md
    summary: "Design technical privacy measures via k-anonymity or differential privacy."
    summary_zh: "用 k-匿名或差分隐私设计技术性的隐私保护方案。"
    display_name_zh: "去标识化规划"
    when_to_use_zh: "当你需要技术层面的隐私保护和去标识化方案时使用。"
    inputs: [DesignSpec, EthicsPackage]
    outputs: [DeidentificationPlan]
    tags: [ethics, privacy, deidentification, k-anonymity, differential-privacy]
    depends_on: [ethics-irb-helper]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: false

  # ══════════════════════════════════════════════════════════
  # E_synthesis — Quality assessment, synthesis, bias
  # ══════════════════════════════════════════════════════════
  - id: evidence-synthesizer
    stage: E_synthesis
    version: "0.4.0-beta.6"
    file: skills/E_synthesis/evidence-synthesizer.md
    summary: "Synthesize evidence narratively or quantitatively with PRISMA-aligned reporting."
    summary_zh: "以符合 PRISMA 的方式进行叙事性或定量证据综合。"
    display_name_zh: "证据综合"
    when_to_use_zh: "当你已有证据材料，需要做叙事综合或 meta-analysis 时使用。"
    inputs: [ExtractionTable, QualityTable]
    outputs: [EvidenceTable, SynthesisMatrix]
    tags: [synthesis, meta-analysis, narrative, evidence-table, PRISMA]
    depends_on: [quality-assessor]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, stats-engine]
    domain_aware: false

  - id: quality-assessor
    stage: E_synthesis
    version: "0.4.0-beta.6"
    file: skills/E_synthesis/quality-assessor.md
    summary: "Assess risk of bias and certainty via RoB 2, ROBINS-I, GRADE."
    summary_zh: "使用 RoB 2、ROBINS-I、GRADE 评估偏倚风险和证据确定性。"
    display_name_zh: "质量评估"
    when_to_use_zh: "当你需要评估 risk of bias 和证据确定性时使用。"
    inputs: [ExtractionTable]
    outputs: [QualityTable, GRADESummary]
    tags: [synthesis, quality, risk-of-bias, GRADE, RoB2, ROBINS-I]
    depends_on: [paper-extractor]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: false

  - id: publication-bias-checker
    stage: E_synthesis
    version: "0.4.0-beta.6"
    file: skills/E_synthesis/publication-bias-checker.md
    summary: "Evaluate publication bias via funnel plots, Egger's test, trim-and-fill."
    summary_zh: "用漏斗图、Egger 检验和 trim-and-fill 评估发表偏倚。"
    display_name_zh: "发表偏倚检查"
    when_to_use_zh: "当你需要判断结果是否受发表偏倚影响时使用。"
    inputs: [EvidenceTable]
    outputs: [PublicationBiasReport]
    tags: [synthesis, publication-bias, funnel-plot, fail-safe-N, trim-and-fill]
    depends_on: [evidence-synthesizer]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem, stats-engine]
    domain_aware: false

  # ══════════════════════════════════════════════════════════
  # F_writing — Manuscript, meta-optimization
  # ══════════════════════════════════════════════════════════
  - id: manuscript-architect
    stage: F_writing
    version: "0.4.0-beta.6"
    file: skills/F_writing/manuscript-architect.md
    summary: "Own story spine, section drafting, and deep analytical framing as one manuscript package."
    summary_zh: "统一负责论文叙事主线、章节起草和深度分析框架。"
    display_name_zh: "论文架构师"
    when_to_use_zh: "当你需要搭建论文整体结构、章节推进和核心论证主线时使用。"
    inputs: [RQSet, EvidenceTable, DesignSpec]
    outputs: [ManuscriptOutline, Manuscript, ClaimGraph, FiguresTablesPlan]
    tags: [writing, manuscript, outline, drafting, claim-evidence]
    depends_on: [evidence-synthesizer]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: true

  - id: analysis-interpreter
    stage: F_writing
    version: "0.4.0-beta.6"
    file: skills/F_writing/analysis-interpreter.md
    summary: "Translate findings into analytical prose with uncertainty, mechanisms, rivals, and boundary conditions."
    summary_zh: "将结果写成包含不确定性、机制、竞争解释和边界条件的分析性文本。"
    display_name_zh: "结果分析解释"
    when_to_use_zh: "当你需要把 quant 或 qualitative findings 写成有分析深度的结果叙述时使用。"
    inputs: [StatsReport, AnalysisPlan, RobustnessPlan]
    outputs: [ResultInterpretation]
    tags: [writing, results, interpretation, robustness, uncertainty]
    depends_on: [stats-engine]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: true

  - id: effect-size-interpreter
    stage: F_writing
    version: "0.4.0-beta.6"
    file: skills/F_writing/effect-size-interpreter.md
    summary: "Explain the substantive magnitude of estimates in interpretable units."
    summary_zh: "用可解释单位说明估计量的实质性大小。"
    display_name_zh: "效应量解释"
    when_to_use_zh: "当你需要把统计系数翻译成读者能理解的实际意义时使用。"
    inputs: [StatsReport, DesignSpec, VenueAnalysis]
    outputs: [EffectInterpretation]
    tags: [writing, results, effect-size, magnitude, interpretation]
    depends_on: [stats-engine]
    compatible_models: [codex, claude, gemini, gpt]
    tooling_requirements: [filesystem]
    domain_aware: true

  - id: table-generator
    stage: F_writing
    version: "0.4.0-beta.6"
