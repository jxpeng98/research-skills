name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  cross-platform-tests:
    name: Cross-platform tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Inject packaged upstream defaults
        shell: bash
        run: bash scripts/inject_project_toml.sh

      - name: Install Python dependencies
        run: python -m pip install .

      - name: Compile critical modules
        run: python -m py_compile bridges/base_bridge.py bridges/orchestrator.py scripts/validate_research_standard.py tests/test_orchestrator_workflows.py tests/test_install_research_skill.py

      - name: Validate research standard
        run: python scripts/validate_research_standard.py --strict

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  shell-release-gates:
    name: Shell and release gates (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Inject packaged upstream defaults
        run: bash scripts/inject_project_toml.sh

      - name: Install Python dependencies
        run: python -m pip install .

      - name: Compile critical modules
        run: python -m py_compile bridges/base_bridge.py bridges/orchestrator.py scripts/validate_research_standard.py tests/test_orchestrator_workflows.py

      - name: Validate shell scripts syntax
        run: |
          bash -n scripts/run_beta_smoke.sh
          bash -n scripts/generate_release_notes.sh
          bash -n scripts/release_ready.sh
          bash -n scripts/release_preflight.sh
          bash -n scripts/release_postflight.sh
          bash -n scripts/release_automation.sh
          bash -n scripts/install_research_skill.sh
          bash -n scripts/inject_project_toml.sh
          bash -n scripts/sync_skill_package.sh

      - name: Run standardized pre-release gates
        run: ./scripts/release_preflight.sh
