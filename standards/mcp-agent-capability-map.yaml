      - "manuscript/discussion.md"
      - "manuscript/discussion_story_spine.md"
  limitation-auditor:
    file: "skills/H_submission/limitation-auditor.md"
    category: "submission"
    focus: "Identifies and structures study constraints, ensuring rigorous self-critique without undermining the manuscript's core contribution."
