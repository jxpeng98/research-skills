name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile critical modules
        run: |
          python -m py_compile \
            bridges/base_bridge.py \
            bridges/orchestrator.py \
            scripts/validate_research_standard.py \
            tests/test_orchestrator_workflows.py

      - name: Validate shell scripts syntax
        run: |
          bash -n scripts/run_beta_smoke.sh
          bash -n scripts/release_preflight.sh
          bash -n scripts/release_postflight.sh
          bash -n scripts/release_automation.sh
          bash -n scripts/install_research_skill.sh

      - name: Run standardized pre-release gates
        run: ./scripts/release_preflight.sh
