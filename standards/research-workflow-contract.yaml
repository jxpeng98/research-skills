    title: "study-design"
    outputs:
      - "study_design.md"
  C1_5:
    stage: "C"
    title: "rival-hypothesis-design"
    outputs:
      - "design/rival_hypotheses.md"
  C2:
    stage: "C"
    title: "instruments"
    outputs:
      - "instruments/"
  C3:
    stage: "C"
    title: "analysis-plan"
    outputs:
      - "analysis_plan.md"
  C3_5:
    stage: "C"
    title: "robustness-plan"
    outputs:
      - "design/robustness_plan.md"
  C4:
    stage: "C"
    title: "data-management-plan"
    outputs:
      - "data_management_plan.md"
  C5:
    stage: "C"
    title: "preregistration"
    outputs:
      - "preregistration.md"
  D1:
    stage: "D"
    title: "ethics-pack"
    outputs:
      - "ethics_irb.md"
  D2:
    stage: "D"
    title: "ethics-statements"
    outputs:
      - "manuscript/manuscript.md"
  D3:
    stage: "D"
    title: "deidentification-plan"
